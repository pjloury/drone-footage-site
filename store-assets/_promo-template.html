<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: sans-serif;
  }

  /* ── Blurred 4-panel collage background (same recipe as og-image) ── */
  .bg {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
  }
  .bg-panel {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    filter: blur(28px) saturate(1.6) brightness(0.72);
    transform: scale(1.12); /* hide blur edge artifacts */
  }

  /* ── Dark vignette so the card text pops ── */
  .overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 80% at 50% 50%, transparent 28%, rgba(0,0,0,0.48) 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.34) 100%);
  }

  /* ── Frosted glass card ── */
  .card-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3.2vh;
    padding: 8vh 11vw;
    border: 1px solid rgba(255,255,255,0.78);
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(18px) saturate(1.5);
    -webkit-backdrop-filter: blur(18px) saturate(1.5);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.10),
      0 12px 48px rgba(0,0,0,0.45),
      0 3px 10px rgba(0,0,0,0.30);
  }
  .name {
    font-family: 'Cormorant Garamond', 'Didot', 'Bodoni MT', 'Times New Roman', serif;
    font-size: 13vh;
    font-weight: 300;
    letter-spacing: 0.28em;
    color: #fff;
    text-transform: uppercase;
    line-height: 1;
    text-shadow: 0 2px 24px rgba(0,0,0,0.55), 0 1px 6px rgba(0,0,0,0.45);
    white-space: nowrap;
    padding-left: 0.28em;
  }
  .sub {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    font-size: 2.9vh;
    font-weight: 300;
    letter-spacing: 0.38em;
    color: rgba(255,255,255,0.90);
    text-transform: uppercase;
    line-height: 1;
    text-shadow: 0 1px 10px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.4);
    white-space: nowrap;
    padding-left: 0.38em;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg">
    <img class="bg-panel" src="_promo_assets/Balearic%20Islands_thumbnail.jpg">
    <img class="bg-panel" src="_promo_assets/Salzburg_thumbnail.jpg">
    <img class="bg-panel" src="_promo_assets/RedRocks_thumbnail.jpg">
    <img class="bg-panel" src="_promo_assets/Hvar,%20Croatia_thumbnail.jpg">
  </div>
  <div class="overlay"></div>
  <div class="card-wrap">
    <div class="card">
      <div class="name">PJ Loury</div>
      <div class="sub">Drone Videography</div>
    </div>
  </div>
</body>
</html>
