<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Footage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    /* ── Video layers ─────────────────────────────────────── */
    #stage { position: relative; width: 100vw; height: 100vh; }

    .layer {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 1.8s ease-in-out;
    }
    .layer.active { opacity: 1; }

    .layer video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* Portrait mobile: force cover from center, crop sides naturally */
    @media (orientation: portrait) and (max-width: 768px) {
      .layer video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
      }
      #caption {
        font-size: clamp(1rem, 5vw, 1.4rem);
        bottom: 60px; left: 20px; right: 20px;
      }
      #hint { display: none; }
    }

    /* ── Caption ──────────────────────────────────────────── */
    #caption {
      position: fixed; bottom: 44px; left: 44px; z-index: 50;
      color: #fff;
      font-family: 'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 400; letter-spacing: 0.04em;
      text-shadow: 0 1px 4px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.6);
      pointer-events: none;
      transition: opacity 0.6s ease-in-out;
    }
    #caption.fade { opacity: 0; }

    /* ── Progress dots ────────────────────────────────────── */
    #dots {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 50; display: flex; gap: 8px;
      pointer-events: none;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,.25);
      transition: background .4s, transform .4s;
    }
    .dot.active { background: rgba(255,255,255,.85); transform: scale(1.4); }

    /* ── Arrow hint ───────────────────────────────────────── */
    #hint {
      position: fixed; bottom: 44px; right: 44px; z-index: 50;
      color: rgba(255,255,255,.35);
      font-size: clamp(.6rem, 1.1vw, .8rem); letter-spacing: .14em;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    #hint.hidden { opacity: 0; }

    /* ── Progress bar ─────────────────────────────────────── */
    #bar-track {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,.12);
      z-index: 50; pointer-events: none;
    }
    #bar {
      height: 100%; width: 0%;
      background: rgba(255,255,255,.55);
      transition: width 0.25s linear;
    }

    /* ── Welcome overlay ─────────────────────────────────── */
    #welcome {
      position: fixed; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;

      /* centered hero state */
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: top left;

      transition:
        top 1.2s cubic-bezier(0.77, 0, 0.175, 1),
        left 1.2s cubic-bezier(0.77, 0, 0.175, 1),
        transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
    }

    #welcome.docked {
      top: 24px;
      left: 24px;
      transform: translate(0, 0) scale(0.32);
    }

    @media (max-width: 768px) {
      #welcome:not(.docked) {
        /* On mobile, scale the welcome box down to fit portrait width */
        transform: translate(-50%, -50%) scale(0.6);
      }
      #welcome.docked {
        transform: translate(0, 0) scale(0.22);
      }
    }

    .welcome-box {
      display: inline-flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,0.75);
      padding: clamp(28px, 5vw, 56px) clamp(40px, 8vw, 96px);
      gap: 14px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px) saturate(1.4);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 8px 32px rgba(0,0,0,0.35),
        0 2px 8px rgba(0,0,0,0.25);
      transition:
        background 1.2s ease,
        box-shadow 1.2s ease,
        border-color 1.2s ease;
    }

    #welcome.docked .welcome-box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border-color: rgba(255,255,255,0.55);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.1),
        0 4px 20px rgba(0,0,0,0.4),
        0 1px 4px rgba(0,0,0,0.3);
    }

    .welcome-name {
      font-family: 'Cormorant Garamond', 'Didot', 'Bodoni MT', 'Playfair Display', 'Times New Roman', serif;
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      color: #fff;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.4);
      white-space: nowrap;
    }
    .welcome-sub {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(0.6rem, 1.4vw, 0.9rem);
      font-weight: 300;
      letter-spacing: 0.38em;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 1px 8px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.35);
      white-space: nowrap;
    }

    /* ── Loading spinner (shown while first video buffers) ── */
    #spinner {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      transition: opacity .8s ease;
    }
    #spinner.gone { opacity: 0; pointer-events: none; }
    .ring {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: rgba(255,255,255,.7);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="welcome">
  <div class="welcome-box">
    <div class="welcome-name">PJ Loury</div>
    <div class="welcome-sub">Drone Videography</div>
  </div>
</div>

<div id="spinner"><div class="ring"></div></div>

<div id="stage">
  <div class="layer" id="layerA"><video id="vidA" playsinline muted preload="auto"></video></div>
  <div class="layer" id="layerB"><video id="vidB" playsinline muted preload="auto"></video></div>
</div>

<div id="caption"></div>
<div id="dots"></div>
<div id="hint">← &nbsp;&nbsp; → &nbsp; to navigate</div>
<div id="bar-track"><div id="bar"></div></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════════════

// Base URL of your Cloudflare R2 public bucket
// e.g. "https://pub-abc123.r2.dev"  (no trailing slash)
const BASE_URL = "https://pub-abee44b9f56049338f38452f0835b88f.r2.dev";

const VIDEOS = [
  { file: "video-01.mp4", caption: "Woodside Mansion"                  },
  { file: "video-02.mp4", caption: "Good Morning Stanford"              },
  { file: "video-03.mp4", caption: "Snowy Tahoe Treetops"               },
  { file: "video-04.mp4", caption: "Carmel Waves at Dusk"               },
  { file: "video-05.mp4", caption: "Financial District"                 },
  { file: "video-06.mp4", caption: "Heavenly Palo Alto"                 },
  { file: "video-07.mp4", caption: "Telegraph Hill"                     },
  { file: "video-08.mp4", caption: "Stanford Sunset"                    },
  { file: "video-09.mp4", caption: "Above SoMa"                        },
  { file: "video-10.mp4", caption: "Los Altos Hills"                    },
  { file: "video-11.mp4", caption: "Sterling Vineyard"                  },
  { file: "video-12.mp4", caption: "Washington Square, North Beach"     },
  { file: "video-13.mp4", caption: "New Office Site"                    },
  { file: "video-14.mp4", caption: "Bay to Breakers"                    },
  { file: "video-15.mp4", caption: "Wailea, Maui"                       },
  { file: "video-16.mp4", caption: "Hvar, Croatia"                      },
  { file: "video-17.mp4", caption: "Sather Tower, Berkeley"             },
  { file: "video-18.mp4", caption: "Villa Collina"                      },
  { file: "video-19.mp4", caption: "Waves"                              },
  { file: "video-20.mp4", caption: "Venice Canals"                      },
  { file: "video-21.mp4", caption: "University of San Francisco"        },
  { file: "video-22.mp4", caption: "Old Valencia, Spain"                },
  { file: "video-23.mp4", caption: "Arches National Park"               },
  { file: "video-24.mp4", caption: "Mont Saint-Michel, France"          },
  { file: "video-25.mp4", caption: "Home on Christmas"                  },
  { file: "video-26.mp4", caption: "Salzburg, Austria"                  },
  { file: "video-27.mp4", caption: "Park City Morning, Utah"            },
  { file: "video-28.mp4", caption: "Flex"                               },
  { file: "video-29.mp4", caption: "Canyonlands National Park"          },
  { file: "video-30.mp4", caption: "Vogelsang Lake, Yosemite"           },
  { file: "video-31.mp4", caption: "Austria"                            },
  { file: "video-32.mp4", caption: "Almaden Green"                      },
  { file: "video-33.mp4", caption: "Mont Saint-Michel"                  },
  { file: "video-34.mp4", caption: "SF Lunar New Year"                  },
  { file: "video-35.mp4", caption: "Big Sur Hills"                      },
  { file: "video-36.mp4", caption: "Fort Funston"                       },
  { file: "video-37.mp4", caption: "Fort Funston & Golden Gate"         },
  { file: "video-38.mp4", caption: "LA Suburbs"                         },
  { file: "video-39.mp4", caption: "Mont Saint-Michel"                  },
  { file: "video-40.mp4", caption: "Neuschwanstein Castle, Germany"     },
  { file: "video-41.mp4", caption: "Park City, Utah"                    },
  { file: "video-42.mp4", caption: "Golden Gate Bridge"                 },
  { file: "video-43.mp4", caption: "Balearic Islands, Spain"            },
  { file: "video-44.mp4", caption: "Mont Saint-Michel"                  },
  { file: "video-45.mp4", caption: "Drifting Away"                      },
  { file: "video-46.mp4", caption: "Laguna de los Tres, Patagonia"      },
  { file: "video-47.mp4", caption: "Canyonlands"                        },
  { file: "video-48.mp4", caption: "Ka\u02bbanapali Surf, Maui"         },
  { file: "video-49.mp4", caption: "Copacabana, Brazil"                 },
  { file: "video-50.mp4", caption: "Palma, Mallorca"                    },
  { file: "video-51.mp4", caption: "Fuschl am See, Austria"             },
  { file: "video-52.mp4", caption: "Moab, Utah"                         },
  { file: "video-53.mp4", caption: "Carmel-by-the-Sea"                  },
  { file: "video-54.mp4", caption: "Garrapata State Park"               },
  { file: "video-55.mp4", caption: "Arches National Park"               },
  { file: "video-56.mp4", caption: "Wailea South, Maui"                 },
  { file: "video-57.mp4", caption: "Red Rocks"                          },
  { file: "video-58.mp4", caption: "Bonneville Salt Flats"              },
  { file: "video-59.mp4", caption: "UC Berkeley Campus"                 },
  { file: "video-60.mp4", caption: "SF Embarcadero"                     },
  { file: "video-61.mp4", caption: "Stanford Main Quad"                 },
  { file: "video-62.mp4", caption: "Sather Tower, Berkeley"             },
];

const CROSSFADE_MS = 1800;  // must match CSS transition duration above

// ═══════════════════════════════════════════════════════════
//  Engine
// ═══════════════════════════════════════════════════════════

const layerA   = document.getElementById("layerA");
const layerB   = document.getElementById("layerB");
const vidA     = document.getElementById("vidA");
const vidB     = document.getElementById("vidB");
const caption  = document.getElementById("caption");
const dotsEl   = document.getElementById("dots");
const hintEl   = document.getElementById("hint");
const barEl    = document.getElementById("bar");
const spinner  = document.getElementById("spinner");

let current         = 0;
let front           = "A";
let busy            = false;
let hintDismissed   = false;
let nextPreloaded   = false;

const PRELOAD_BEFORE_END_S = 5; // seconds before end to start buffering next video

function url(index) {
  return `${BASE_URL}/${VIDEOS[index].file}`;
}

// ── Dots ─────────────────────────────────────────────────
function buildDots() {
  dotsEl.innerHTML = "";
  VIDEOS.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === 0 ? " active" : "");
    dotsEl.appendChild(d);
  });
}
function updateDots() {
  dotsEl.querySelectorAll(".dot").forEach((d, i) =>
    d.classList.toggle("active", i === current));
}

// ── Progress bar (timeupdate-driven) ─────────────────────
function updateBar(vid) {
  if (!vid.duration) return;
  const pct = (vid.currentTime / vid.duration) * 100;
  barEl.style.width = pct + "%";
}
function resetBar() {
  barEl.style.width = "0%";
}

// ── Caption ───────────────────────────────────────────────
function setCaption(text) {
  caption.classList.add("fade");
  setTimeout(() => {
    caption.textContent = text;
    caption.classList.remove("fade");
  }, 350);
}

// ── Gapless preload ───────────────────────────────────────
function preloadNext() {
  if (nextPreloaded || busy) return;
  nextPreloaded = true;
  const idleVid = front === "A" ? vidB : vidA;
  const nextIdx = ((current + 1) % VIDEOS.length + VIDEOS.length) % VIDEOS.length;
  const nextUrl = url(nextIdx);
  // Only load if idle layer isn't already holding this video
  if (!idleVid.src || !idleVid.src.includes(VIDEOS[nextIdx].file)) {
    idleVid.src = nextUrl;
    idleVid.preload = "auto";
    idleVid.load();
  }
}

// ── Core navigate ─────────────────────────────────────────
function goTo(index) {
  if (busy) return;
  busy = true;
  nextPreloaded = false;
  resetBar();

  current = ((index % VIDEOS.length) + VIDEOS.length) % VIDEOS.length;

  const backLayer = front === "A" ? layerB : layerA;
  const backVid   = front === "A" ? vidB   : vidA;
  const fwdLayer  = front === "A" ? layerA : layerB;
  const fwdVid    = front === "A" ? vidA   : vidB;

  // If already preloaded into backVid for this index, just seek & play
  const expectedSrc = url(current);
  if (!backVid.src || !backVid.src.includes(VIDEOS[current].file)) {
    backVid.src = expectedSrc;
    backVid.load();
  }
  backVid.currentTime = 0;
  backVid.play().catch(() => {});

  // Crossfade
  backLayer.classList.add("active");
  requestAnimationFrame(() => fwdLayer.classList.remove("active"));
  front = front === "A" ? "B" : "A";

  setCaption(VIDEOS[current].caption);
  updateDots();

  setTimeout(() => {
    // Unload the now-hidden video
    fwdVid.pause();
    fwdVid.ontimeupdate = null;
    fwdVid.onended = null;
    fwdVid.removeAttribute("src");
    fwdVid.load();

    busy = false;

    // Drive progress bar from actual playback position
    backVid.ontimeupdate = () => {
      updateBar(backVid);
      // Start buffering next video 5s before this one ends
      if (backVid.duration && (backVid.duration - backVid.currentTime) <= PRELOAD_BEFORE_END_S) {
        preloadNext();
      }
    };

    backVid.onended = next;
  }, CROSSFADE_MS + 100);
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

// ── Keyboard ──────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") { dismissHint(); next(); }
  if (e.key === "ArrowLeft")  { dismissHint(); prev(); }
});

// ── Touch / swipe ─────────────────────────────────────────
let touchX = null;
document.addEventListener("touchstart", e => { touchX = e.touches[0].clientX; }, { passive: true });
document.addEventListener("touchend", e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) { dismissHint(); dx < 0 ? next() : prev(); }
  touchX = null;
}, { passive: true });

// ── Hint dismiss ──────────────────────────────────────────
function dismissHint() {
  if (!hintDismissed) { hintDismissed = true; hintEl.classList.add("hidden"); }
}
setTimeout(dismissHint, 5000);

// ── Shuffle ───────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
shuffle(VIDEOS);

// ── Init ──────────────────────────────────────────────────
function startPlayback() {
  spinner.classList.add("gone");
  layerA.classList.add("active");
  vidA.play().catch(() => {
    // Mobile Safari blocked autoplay — show a tap-to-start overlay
    showTapPrompt();
  });
  caption.textContent = VIDEOS[0].caption;
  vidA.ontimeupdate = () => {
    updateBar(vidA);
    if (vidA.duration && (vidA.duration - vidA.currentTime) <= PRELOAD_BEFORE_END_S) {
      preloadNext();
    }
  };
  vidA.onended = next;
}

function showTapPrompt() {
  const tap = document.createElement("div");
  tap.id = "tap-prompt";
  tap.style.cssText = `
    position:fixed;inset:0;z-index:500;display:flex;align-items:center;
    justify-content:center;cursor:pointer;background:rgba(0,0,0,0.01);
  `;
  tap.innerHTML = `<div style="color:rgba(255,255,255,0.7);font-size:0.85rem;letter-spacing:0.2em;text-transform:uppercase;pointer-events:none;">Tap to play</div>`;
  document.body.appendChild(tap);
  tap.addEventListener("click", () => {
    vidA.play().catch(() => {});
    tap.remove();
  }, { once: true });
}

function init() {
  buildDots();

  vidA.src = url(0);
  vidA.muted = true;
  vidA.playsInline = true;
  vidA.preload = "auto";
  vidA.load();

  let started = false;
  function tryStart() {
    if (started) return;
    started = true;
    startPlayback();
  }

  // canplay fires when enough data is ready
  vidA.addEventListener("canplay", tryStart, { once: true });
  // canplaythrough as backup
  vidA.addEventListener("canplaythrough", tryStart, { once: true });
  // Fallback: dismiss spinner after 5s regardless
  setTimeout(() => {
    spinner.classList.add("gone");
    if (!started) {
      started = true;
      // Try to play anyway — may need tap on mobile
      vidA.play().catch(() => showTapPrompt());
      caption.textContent = VIDEOS[0].caption;
      vidA.ontimeupdate = () => {
        updateBar(vidA);
        if (vidA.duration && (vidA.duration - vidA.currentTime) <= PRELOAD_BEFORE_END_S) {
          preloadNext();
        }
      };
      vidA.onended = next;
    }
  }, 5000);
}

init();

// ── Welcome overlay — dock to top-left after 30s ─────────
const welcomeEl = document.getElementById("welcome");
setTimeout(() => {
  welcomeEl.classList.add("docked");
}, 30000);
</script>
</body>
</html>
