    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    /* ── Video layers ─────────────────────────────────────── */
    #stage {
      position: fixed; inset: 0;
      /* dvh fills the full visual viewport on mobile incl. landscape */
      width: 100dvw; height: 100dvh;
    }

    .layer {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 4s ease-in-out;
    }
    .layer.active { opacity: 1; }

    .layer video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* ── Caption ──────────────────────────────────────────── */
    #caption {
      position: fixed;
      bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      left: calc(24px + env(safe-area-inset-left, 0px));
      z-index: 50;
      color: #fff;
      font-family: 'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 400; letter-spacing: 0.04em;
      text-shadow: 0 1px 4px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.6);
      pointer-events: none;
      transition: opacity 0.6s ease-in-out;
    }
    #caption.fade { opacity: 0; }

    /* Portrait: smaller caption */
    @media (orientation: portrait) {
      #caption {
        font-size: clamp(1rem, 5vw, 1.4rem);
        bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      }
      #hint { display: none; }
    }

    /* Landscape mobile: compact caption, respect safe areas */
    @media (orientation: landscape) and (max-height: 500px) {
      #caption {
        font-size: clamp(0.85rem, 2.5vh, 1.2rem);
        bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      }
      #dots { bottom: calc(8px + env(safe-area-inset-bottom, 0px)); }
    }

    /* ── Progress dots ────────────────────────────────────── */
    #dots {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 50; display: flex; gap: 8px;
      pointer-events: none;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,.25);
      transition: background .4s, transform .4s, opacity .4s;
    }
    .dot.active { background: rgba(255,255,255,.85); transform: scale(1.4); }

    /* ── Arrow hint ───────────────────────────────────────── */
    #hint {
      position: fixed;
      bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      right: calc(44px + env(safe-area-inset-right, 0px));
      z-index: 50;
      color: rgba(255,255,255,.35);
      font-size: clamp(.6rem, 1.1vw, .8rem); letter-spacing: .14em;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    #hint.hidden { opacity: 0; }


    /* ── Progress bar ─────────────────────────────────────── */
    #bar-track {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 4px;
      background: rgba(255,255,255,.12);
      z-index: 50; pointer-events: none;
    }
    #bar {
      height: 100%; width: 0%;
      background: rgba(255,255,255,.55);
      transition: width 0.25s linear;
    }

    /* ── Welcome overlay ─────────────────────────────────── */
    #welcome {
      position: fixed; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;

      /* centered hero state */
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: top left;

      transition:
        top 1.5s cubic-bezier(0.77, 0, 0.175, 1),
        left 1.5s cubic-bezier(0.77, 0, 0.175, 1),
        transform 1.5s cubic-bezier(0.77, 0, 0.175, 1);
    }

    #welcome.docked {
      top: calc(24px + env(safe-area-inset-top, 0px));
      left: calc(24px + env(safe-area-inset-left, 0px));
      transform: translate(0, 0) scale(0.32);
    }

    @media (max-width: 768px) {
      /* translate(-30%,-30%) + scale(0.6) centres the element at 50vw/50vh
         when transform-origin is top left (compensates for the scale shrink) */
      #welcome:not(.docked) {
        transform: translate(-30%, -30%) scale(0.6);
      }
      #welcome.docked {
        transform: translate(0, 0) scale(0.38);
      }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      /* same centering fix for scale(0.45): -50%*(0.45) = -22.5% */
      #welcome:not(.docked) {
        transform: translate(-22.5%, -22.5%) scale(0.45);
      }
      #welcome.docked {

      background: #fff; margin-right: 10px; flex-shrink: 0;

      content: ""; display: inline-block;
      width: 5px; height: 5px; margin-right: 10px; flex-shrink: 0;
    }
    .section-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 4px 14px; }

      stroke: rgba(255,255,255,0.18);
      stroke-width: 0.6;
      stroke-linejoin: round;

    .map-dot { fill: rgba(255,255,255,0.9); }
    .map-dot-glow {
      fill: rgba(255,255,255,0.25);
      animation: map-pulse 2.5s ease-in-out infinite;
    }
    @keyframes map-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0; }
    }

      #section-btn { width: 32px; height: 32px; }

    @media (orientation: landscape) and (max-height: 500px) {
      #minimap {
        width: 100px; height: 60px;
        bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      }
      #map-us { width: 80px; }
      #map-world { width: 100px; }
    }

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════

const SESSION_ID =
  typeof crypto !== "undefined" && crypto.randomUUID
    ? crypto.randomUUID()
    : String(Date.now()) + "-" + Math.random().toString(36).slice(2);

const TELEMETRY_FLUSH_MS = 3000;
const TELEMETRY_BATCH_MAX = 12;

let telemetryQueue = [];

/** If first clip errors and we recover via goTo, skip the 6s init timer calling begin() on vidA. */
let suppressInitialBegin = false;
/** Avoid auto-skipping on spurious `error` before first `begin()` (e.g. races during load). */
let allowErrorRecovery = false;

function clipPayloadFromVideo(v) {
  const idx = v.dataset.clipIndex != null ? parseInt(v.dataset.clipIndex, 10) : NaN;
  const safeIdx = Number.isFinite(idx) && idx >= 0 && idx < VIDEOS.length ? idx : null;
  return {
    clipIndex: safeIdx,
    file: safeIdx != null ? VIDEOS[safeIdx].file : null,
    src: v.currentSrc || v.src || null,
    networkState: v.networkState,
    readyState: v.readyState,
  };
}

function resourceTimingForUrl(absUrl) {
  if (!absUrl || typeof performance === "undefined" || !performance.getEntriesByName) return null;
  try {
    const entries = performance.getEntriesByName(absUrl);
    const e = entries[entries.length - 1];
    if (!e || e.entryType !== "resource") return null;
    return {
      durationMs: Math.round(e.duration),
      transferSize: e.transferSize,
      encodedBodySize: e.encodedBodySize,
      responseStatus:
        typeof e.responseStatus === "number" && e.responseStatus !== 0 ? e.responseStatus : null,
    };
  } catch (_) {
    return null;
  }
}

/** Rough attribution hint — combine with mediaError + responseStatus in your dashboard. */
function inferRootHint(ev) {
  const code = ev.mediaErrorCode;
  const http = ev.resourceHttpStatus;
  if (http === 403 || http === 404) return "edge_http_status";
  if (code === 3) return "browser_decode";
  if (code === 4) return "browser_codec_or_container";
  if (code === 2) return "network_load";
  if (code === 1) return "aborted_or_detach";
  if (ev.name === "stalled" || ev.name === "waiting") return "buffering_or_throughput";
  if (ev.name === "play_rejected") return "browser_autoplay_or_policy";
  return "unknown";
}

function queueTelemetry(ev) {
  const base = {
    ...ev,
    ...DEVICE_CONTEXT,
    sessionId: SESSION_ID,
    t: Date.now(),
    path: typeof location !== "undefined" ? location.pathname : "",
    visibility: typeof document !== "undefined" ? document.visibilityState : "",
    connection:
      typeof navigator !== "undefined" && navigator.connection
        ? {
            effectiveType: navigator.connection.effectiveType,
            downlink: navigator.connection.downlink,
            rtt: navigator.connection.rtt,
            saveData: navigator.connection.saveData,

        : null,

      last: base,

      telemetryFlushTimer = null;
      flushTelemetry();
    }, TELEMETRY_FLUSH_MS);
  }
}

function flushTelemetry() {
  if (!POSTHOG_KEY || telemetryQueue.length === 0) return;
  const events = telemetryQueue.splice(0, telemetryQueue.length);
  const body = JSON.stringify({
    api_key: POSTHOG_KEY,
    batch: events.map(({ name, t, sessionId, ...properties }) => ({
      event:       name,
      distinct_id: SESSION_ID,
      timestamp:   new Date(t).toISOString(),
      properties,
    })),
  });
  const url = POSTHOG_HOST + "/batch/";
  try {
    if (typeof navigator !== "undefined" && navigator.sendBeacon) {
      const ok = navigator.sendBeacon(url, new Blob([body], { type: "application/json" }));
      if (ok) return;
    }
  } catch (_) {}
  fetch(url, {
    method: "POST",
    body,
    headers: { "Content-Type": "application/json" },
    keepalive: true,
    mode: "cors",
  }).catch(() => {});
}

if (typeof window !== "undefined") {
  window.addEventListener("pagehide", flushTelemetry);
  window.addEventListener("beforeunload", flushTelemetry);
}

// Detect mobile once — used to route to lower-bitrate H.264 versions
const IS_MOBILE = typeof navigator !== "undefined" &&
  /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

// Tracks clips that have been downgraded from full-res to mobile quality due to slow loading
const degradedClips = new Set();

function url(i) {
  const file = VIDEOS[i].file;
  const useLowRes = IS_MOBILE || degradedClips.has(i);
  return `${BASE_URL}/${useLowRes ? file.replace(".mp4", "-mobile.mp4") : file}`;
}

// Returns the filename segment actually being used for a given index (accounting for degradation)
function videoFilename(i) {
  const file = VIDEOS[i].file;
  return (IS_MOBILE || degradedClips.has(i)) ? file.replace(".mp4", "-mobile.mp4") : file;
}

/** Parse UA once for PostHog device context ($browser / $os / $device_type). */
function getDeviceContext() {
  if (typeof navigator === "undefined") return {};
  const ua = navigator.userAgent || "";
  const isTablet = /iPad|Android(?!.*Mobile)/i.test(ua);
  const isMobile = IS_MOBILE && !isTablet;

  let $browser = "unknown";
  if (/Firefox\//i.test(ua))                          $browser = "Firefox";
  else if (/Edg\//i.test(ua))                         $browser = "Edge";
  else if (/OPR\//i.test(ua))                         $browser = "Opera";
  else if (/Chrome\//i.test(ua))                      $browser = "Chrome";
  else if (/Safari\//i.test(ua))                      $browser = "Safari";

  let $os = "unknown";
  if (/iPhone|iPod/.test(ua))                         $os = "iOS";
  else if (/iPad/.test(ua))                           $os = "iPadOS";
  else if (/Android/i.test(ua))                       $os = "Android";
  else if (/Mac OS X/i.test(ua))                      $os = "macOS";
  else if (/Windows/i.test(ua))                       $os = "Windows";
  else if (/Linux/i.test(ua))                         $os = "Linux";

  return {
    $browser,
    $os,
    $device_type: isTablet ? "tablet" : isMobile ? "mobile" : "desktop",
  };
}

const DEVICE_CONTEXT = getDeviceContext();

function frontVid()   { return front === "A" ? vidA : vidB; }
function frontLayer() { return front === "A" ? layerA : layerB; }
function backVid()    { return front === "A" ? vidB : vidA; }
function backLayer()  { return front === "A" ? layerB : layerA; }

const MAX_DOTS  = 9;
const HALF_DOTS = Math.floor(MAX_DOTS / 2);

function buildDots() {
  dotsEl.innerHTML = "";
  for (let i = 0; i < MAX_DOTS; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i === HALF_DOTS ? " active" : "");
    dotsEl.appendChild(d);
  }
}
function updateDots() {
  const total = VIDEOS.length;
  [...dotsEl.querySelectorAll(".dot")].forEach((d, slot) => {
    const idx  = current - HALF_DOTS + slot;
    const dist = Math.abs(slot - HALF_DOTS);
    const inRange = idx >= 0 && idx < total;
    d.classList.toggle("active", slot === HALF_DOTS);
    d.style.opacity = inRange
      ? (dist === 0 ? "1" : dist <= 1 ? "0.6" : "0.3")
      : "0";
  });
}
function updateBar(vid) {
  if (vid.duration) barEl.style.width = (vid.currentTime / vid.duration * 100) + "%";
}
function resetBar() { barEl.style.width = "0%"; }

function clearGoToLoad() {
  if (activeGoToAbort) {
    try { activeGoToAbort.abort(); } catch (_) {}
    activeGoToAbort = null;
  }
  if (activeGoToWatchdog != null) {
    clearTimeout(activeGoToWatchdog);
    activeGoToWatchdog = null;
  }
}

// Pre-buffer next video into back layer quietly
function preloadNext() {
  const nextIdx = (current + 1) % VIDEOS.length;
  const bv = backVid();
  if (bv.src.includes(videoFilename(nextIdx))) return; // already loaded
  bv.ontimeupdate = null;
  bv.onended = null;
  bv.dataset.clipIndex = String(nextIdx);
  bv.src = url(nextIdx);
  bv.preload = "auto";
  bv.load();
}
function preloadPrev() {
  const prevIdx = (current - 1 + VIDEOS.length) % VIDEOS.length;
  const bv = backVid();
  if (bv.src.includes(videoFilename(prevIdx))) return; // already loaded
  bv.ontimeupdate = null;
  bv.onended = null;
  bv.dataset.clipIndex = String(prevIdx);
  bv.src = url(prevIdx);
  bv.preload = "auto";
  bv.load();
}

function safePlay(video, context) {
  return video.play().catch((err) => {
    const abs = video.currentSrc || video.src;
    const rt = resourceTimingForUrl(abs);
    queueTelemetry({
      name: "play_rejected",
      context,
      message: err && err.message ? err.message : String(err),
      rootHint: "browser_autoplay_or_policy",
      ...clipPayloadFromVideo(video),
      resourceTiming: rt,
      resourceHttpStatus: rt && rt.responseStatus,
    });
  });
}

function recoverFromClipError(video, source) {
  allowErrorRecovery = true;
  if (consecutiveAutoSkips >= MAX_AUTO_SKIPS) {
    queueTelemetry({
      name: "recover_cap",
      source,
      rootHint: "unknown",
      ...clipPayloadFromVideo(video),
    });
    return;
  }
  if (video.dataset.clipIndex === "0") {
    suppressInitialBegin = true;
    spinner.classList.add("gone");
  }
  consecutiveAutoSkips++;
  clearGoToLoad();
  transitioning = false;
  queueTelemetry({
    name: "recover_skip",
    source,
    rootHint: "unknown",
    ...clipPayloadFromVideo(video),
  });
  goTo(current + 1, { force: true });
}

function onVideoError(e) {
  const v = e.target;
  const me = v.error;
  const abs = v.currentSrc || v.src;
  const rt = resourceTimingForUrl(abs);
  const mediaErrorCode = me ? me.code : null;
  const mediaErrorMessage = me ? me.message : "";
  queueTelemetry({
    name: "video_error",
    mediaErrorCode,
    mediaErrorMessage,
    rootHint: inferRootHint({
      name: "video_error",
      mediaErrorCode,
      resourceHttpStatus: rt && rt.responseStatus,
    }),
    isFront: v === frontVid(),
    transitioning,
    preBootstrap: !allowErrorRecovery,
    ...clipPayloadFromVideo(v),
    resourceTiming: rt,
    resourceHttpStatus: rt && rt.responseStatus,
  });

  if (!allowErrorRecovery) return;
  // Avoid skipping the whole slideshow on spurious early errors (e.g. code 4 before any
  // buffer). Still recover for true network failures (typically code 2) even at readyState 0.
  if (mediaErrorCode === 1) return;
  if (v.readyState < 2 && mediaErrorCode !== 2) {
    queueTelemetry({
      name: "video_error_ignored_prebuffer",
      mediaErrorCode,
      rootHint: inferRootHint({
        name: "video_error",
        mediaErrorCode,
        resourceHttpStatus: rt && rt.responseStatus,
      }),
      ...clipPayloadFromVideo(v),
    });
    return;
  }
  if (v !== frontVid() && !transitioning) {
    return;
  }
  recoverFromClipError(v, "media_error");
}

let stallLogTimer = null;
function onStalled(e) {
  if (stallLogTimer) return;
  stallLogTimer = setTimeout(() => {
    stallLogTimer = null;
    const v = e.target;
    const abs = v.currentSrc || v.src;
    const rt = resourceTimingForUrl(abs);
    queueTelemetry({
      name: "stalled",
      rootHint: "buffering_or_throughput",
      ...clipPayloadFromVideo(v),
      resourceTiming: rt,
      resourceHttpStatus: rt && rt.responseStatus,
    });
  }, 2500);
}

function onWaiting(e) {
  const v = e.target;
  if (v !== frontVid()) return;
  const abs = v.currentSrc || v.src;
  const rt = resourceTimingForUrl(abs);
  queueTelemetry({
    name: "waiting",
    rootHint: "buffering_or_throughput",
    ...clipPayloadFromVideo(v),
    resourceTiming: rt,
    resourceHttpStatus: rt && rt.responseStatus,
  });
}

function attachVideoAnalytics(v) {
  v.addEventListener("error", onVideoError);
  v.addEventListener("stalled", onStalled, { passive: true });
  v.addEventListener("waiting", onWaiting, { passive: true });
  v.addEventListener(
    "playing",
    () => {
      consecutiveAutoSkips = 0;
    },
    { passive: true }
  );
}

function goTo(index, opts) {
  const force = opts && opts.force;
  if (transitioning && !force) return;
  clearGoToLoad();
  transitioning = true;
  resetBar();

  const prevCurrent = current;
  const goingBackward = index < prevCurrent;
  current = ((index % VIDEOS.length) + VIDEOS.length) % VIDEOS.length;

  // Grab refs before flip
  const incoming      = backVid();
  const incomingLayer = backLayer();
  const outgoing      = frontVid();
  const outgoingLayer = frontLayer();

  // Kill outgoing handlers IMMEDIATELY — prevents preloadNext() from
  // clobbering the incoming video's src while it's trying to load
  outgoing.ontimeupdate = null;
  outgoing.onended      = null;

  // Clear stale handlers on incoming
  incoming.ontimeupdate = null;
  incoming.onended      = null;

  incoming.dataset.clipIndex = String(current);
  // Load if not already preloaded at the correct quality level
  if (!incoming.src.includes(videoFilename(current))) {
    incoming.src     = url(current);
    incoming.preload = "auto";
    incoming.load();
  }

  // Flip front/back tracking
  front = front === "A" ? "B" : "A";

  // START THE VISUAL TRANSITION IMMEDIATELY (feels responsive)
  // Outgoing starts fading out right away regardless of load state
  caption.classList.add("fade");
  updateDots();
  setTimeout(() => outgoingLayer.classList.remove("active"), 50);

  activeGoToAbort = new AbortController();

  // Quality fallback: if full-res hasn't buffered within 2.5s, silently retry at mobile quality.
  // The existing canplay listener fires again for the new src — no other wiring needed.
  let fallbackTimer = null;
  function tryFallback() {
    fallbackTimer = null;
    if (IS_MOBILE || degradedClips.has(current)) return;
    degradedClips.add(current);
    queueTelemetry({
      name: "quality_fallback",
      rootHint: "buffering_or_throughput",
      ...clipPayloadFromVideo(incoming),
    });
    incoming.src = url(current); // url() now returns mobile URL for this index
    incoming.preload = "auto";
    incoming.load();
    // Reset watchdog so mobile version gets its own full 5s window
    clearTimeout(activeGoToWatchdog);
    activeGoToWatchdog = setTimeout(() => {
      activeGoToWatchdog = null;
      if (!transitioning) return;
      const abs = incoming.currentSrc || incoming.src;
      const rtW = resourceTimingForUrl(abs);
      queueTelemetry({
        name: "watchdog_timeout",
        rootHint: "buffering_or_throughput",
        fromIndex: prevCurrent,
        ...clipPayloadFromVideo(incoming),
        resourceTiming: rtW,
        resourceHttpStatus: rtW && rtW.responseStatus,
      });
      clearGoToLoad();
      transitioning = false;
      goTo(current + 1);
    }, 5000);
  }
  if (!IS_MOBILE && !degradedClips.has(current) && incoming.readyState < 3) {
    fallbackTimer = setTimeout(tryFallback, 2500);
  }

  function doTransition() {
    if (fallbackTimer) { clearTimeout(fallbackTimer); fallbackTimer = null; }
    clearGoToLoad();
    safePlay(incoming, "goTo_crossfade");
    incomingLayer.classList.add("active");

    // Caption fades in halfway through
    setTimeout(() => {
      caption.textContent = VIDEOS[current].caption;
      caption.classList.remove("fade");
      updateMiniMap();
    }, CROSSFADE_MS / 2);

    setTimeout(() => {
      outgoing.pause();
      incoming.ontimeupdate = () => {
        updateBar(incoming);
        if (incoming.duration && (incoming.duration - incoming.currentTime) < 8) {
          preloadNext();
        }
      };
      incoming.onended = () => goTo(current + 1);
      if (goingBackward) preloadPrev();
      transitioning = false;
    }, CROSSFADE_MS + 100);
  }

  // Watchdog: skip broken/stuck video after 5s
  activeGoToWatchdog = setTimeout(() => {
    activeGoToWatchdog = null;
    if (!transitioning) return;
    const abs = incoming.currentSrc || incoming.src;
    const rtW = resourceTimingForUrl(abs);
    queueTelemetry({
      name: "watchdog_timeout",
      rootHint: "buffering_or_throughput",
      fromIndex: prevCurrent,
      ...clipPayloadFromVideo(incoming),
      resourceTiming: rtW,
      resourceHttpStatus: rtW && rtW.responseStatus,
    });
    clearGoToLoad();
    transitioning = false;
    goTo(current + 1);
  }, 5000);

  if (incoming.readyState >= 3) {
    doTransition();
  } else {
    incoming.addEventListener(
      "canplay",
      doTransition,
      { once: true, signal: activeGoToAbort.signal }
    );
  }
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

  });
  const divider = document.createElement("div");
  divider.className = "section-divider";
  sectionDropdown.appendChild(divider);
  const shuf = document.createElement("div");
  shuf.className = "section-item" + (playbackMode === "shuffle" ? " active" : "");
  shuf.textContent = "Shuffle All";
  shuf.addEventListener("click", e => { e.stopPropagation(); setPlaybackMode("shuffle"); closeSectionMenu(); });
  sectionDropdown.appendChild(shuf);
}

function openSectionMenu()  { sectionMenuOpen = true;  buildSectionMenu(); sectionDropdown.classList.add("open"); sectionBtn.classList.add("active"); }
function closeSectionMenu() { sectionMenuOpen = false; sectionDropdown.classList.remove("open"); sectionBtn.classList.remove("active"); }
function toggleSectionMenu() { sectionMenuOpen ? closeSectionMenu() : openSectionMenu(); }

sectionBtn.addEventListener("click", e => { e.stopPropagation(); toggleSectionMenu(); });
document.addEventListener("click", () => { if (sectionMenuOpen) closeSectionMenu(); });

// Prevent section UI touches from triggering video navigation
[sectionBtn, sectionDropdown].forEach(el => {
  el.addEventListener("touchstart", e => e.stopPropagation());
  el.addEventListener("touchend",   e => e.stopPropagation());
});

function setPlaybackMode(mode) {
  playbackMode = mode;
  let newOrder;
  if (mode === "shuffle") {
    newOrder = MASTER_VIDEOS.map(v => ({...v}));
    for (let i = newOrder.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newOrder[i], newOrder[j]] = [newOrder[j], newOrder[i]];
    }
  } else {
    const idx = SECTIONS.findIndex(s => s.id === mode);
    const ordered = [...SECTIONS.slice(idx), ...SECTIONS.slice(0, idx)];
    newOrder = [];
    ordered.forEach(sec => MASTER_VIDEOS.filter(v => v.section === sec.id).forEach(v => newOrder.push({...v})));
  }
  VIDEOS.length = 0;
  newOrder.forEach(v => VIDEOS.push(v));
  clearGoToLoad();
  transitioning = false;
  current = 0;
  buildDots();
  goTo(0, { force: true });
}

// ── Mini map ─────────────────────────────────────────────

// Simplified SVG paths — continental US outline
const US_PATH = "M7,5 L1,8 3,40 3,48 9,61 15,78 26,87 35,88 54,94 63,91 75,103 94,120 102,103 120,105 132,98 139,103 146,120 151,125 153,118 149,98 149,90 168,75 171,55 180,45 186,40 197,25 197,15 180,25 163,33 153,40 141,43 129,40 119,15 102,5 71,5 31,5Z";
const HAWAII_PATH = "M18,112 L22,110 26,112 24,115 20,115Z M28,108 L33,106 37,109 33,112 28,111Z";

// World continent outlines (equirectangular)
const WORLD_PATHS = [
  "M30,33 L42,38 55,50 58,60 62,70 68,80 78,93 90,107 96,107 100,87 106,67 113,53 110,43 100,35 88,27 72,25 55,28 40,30Z",
  "M100,113 L108,115 118,120 130,125 140,132 142,145 137,155 128,165 120,175 112,188 107,182 103,168 100,150 100,135 100,122Z",
  "M165,35 L170,42 170,50 172,57 175,65 178,70 184,67 192,63 198,55 200,45 196,37 190,34 180,33Z",
  "M172,73 L168,82 170,97 175,112 182,128 190,145 196,158 200,165 206,155 212,138 216,120 214,105 210,92 208,82 202,75 195,72Z",
  "M208,55 L218,52 228,58 238,55 255,48 272,40 288,33 305,30 318,35 332,42 342,50 345,58 338,63 325,70 310,77 295,83 280,90 268,97 258,105 252,95 242,82 232,72 222,65 213,60Z",
  "M295,142 L305,137 318,138 328,145 332,155 328,164 318,170 308,168 298,163 293,152Z",
  "M128,22 L140,20 148,25 148,33 142,40 132,38 126,30Z",
];

function isContigUS(lat, lng) { return lat >= 24.5 && lat <= 49.5 && lng >= -125 && lng <= -66; }
function projectUS(lat, lng) { return { x: ((lng + 125) / 59) * 200, y: ((50 - lat) / 26) * 130 }; }
function projectWorld(lat, lng) { return { x: ((lng + 180) / 360) * 360, y: ((90 - lat) / 150) * 200 }; }

function initMiniMap() {
  minimapEl.innerHTML =
    '<svg id="map-us" class="map-svg" viewBox="-2 -2 204 134" preserveAspectRatio="xMidYMid meet">' +
      '<path d="' + US_PATH + '" class="map-land"/>' +
      '<path d="' + HAWAII_PATH + '" class="map-land"/>' +
      '<circle class="map-dot-glow" cx="0" cy="0" r="6"/>' +
      '<circle class="map-dot" cx="0" cy="0" r="2.5"/>' +
    '</svg>' +
    '<svg id="map-world" class="map-svg hidden" viewBox="-2 -2 364 204" preserveAspectRatio="xMidYMid meet">' +
      WORLD_PATHS.map(p => '<path d="' + p + '" class="map-land"/>').join("") +
      '<circle class="map-dot-glow" cx="0" cy="0" r="7"/>' +
      '<circle class="map-dot" cx="0" cy="0" r="3"/>' +
    '</svg>';
}

function updateMiniMap() {
  const v = VIDEOS[current];
  if (!v || v.lat == null) return;
  const showUS = isContigUS(v.lat, v.lng);
  const mapType = showUS ? "us" : "world";
  if (mapType !== currentMapType) {
    currentMapType = mapType;
    document.getElementById("map-us").classList.toggle("hidden", !showUS);
    document.getElementById("map-world").classList.toggle("hidden", showUS);
  }
  const svg = document.getElementById(showUS ? "map-us" : "map-world");
  const pos = showUS ? projectUS(v.lat, v.lng) : projectWorld(v.lat, v.lng);
  svg.querySelectorAll(".map-dot, .map-dot-glow").forEach(d => {
    d.setAttribute("cx", pos.x);
    d.setAttribute("cy", pos.y);
  });
}

// ── keyboard / swipe ──────────────────────────────────────
// ── Welcome overlay toggle ────────────────────────────────
let welcomeDocked = false;
function toggleWelcome() {
  welcomeDocked = !welcomeDocked;
  welcomeEl.classList.toggle("docked", welcomeDocked);
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && sectionMenuOpen) { closeSectionMenu(); return; }
  if (e.key === "ArrowRight") { dismissHint(); closeSectionMenu(); next(); }
  if (e.key === "ArrowLeft")  { dismissHint(); closeSectionMenu(); prev(); }
  if (e.key === "ArrowUp" || e.key === "ArrowDown") { e.preventDefault(); toggleWelcome(); }
});

let touchX = null;
let touchY = null;
document.addEventListener("touchstart", e => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchend", e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 35) {
    // vertical swipe — toggle welcome overlay
    toggleWelcome();
  } else if (Math.abs(dx) > 35) {
    dismissHint();
    dx < 0 ? next() : prev();
  }
  touchX = null;
  touchY = null;
}, { passive: true });

function dismissHint() {
  if (!hintDismissed) { hintDismissed = true; hintEl.classList.add("hidden"); }
}
setTimeout(dismissHint, 5000);

// ── shuffle (default mode) ────────────────────────────────
(function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
})(VIDEOS);
playbackMode = "shuffle";

// ── init ──────────────────────────────────────────────────
function init() {
  initMiniMap();
  buildDots();

  // Set up first video on layer A
  vidA.dataset.clipIndex = "0";
  vidA.src = url(0);
  vidA.muted = true;
  vidA.playsInline = true;
  vidA.preload = "auto";
  vidA.load();

  let started = false;
  function begin() {
    if (suppressInitialBegin) return;
    if (started) return;
    allowErrorRecovery = true;
    started = true;
    spinner.classList.add("gone");
    setTimeout(() => { sectionBtn.classList.add("visible"); minimapEl.classList.add("visible"); }, 1500);
    layerA.classList.add("active");
    safePlay(vidA, "init_begin");
    caption.textContent = VIDEOS[0].caption;
    updateMiniMap();
    vidA.ontimeupdate = () => {
      updateBar(vidA);
      if (vidA.duration && (vidA.duration - vidA.currentTime) < 8) preloadNext();
    };
    vidA.onended = () => goTo(current + 1);
  }

  vidA.addEventListener("canplay", begin, { once: true });
  setTimeout(() => { spinner.classList.add("gone"); begin(); }, 6000);
}

init();

// ── Welcome overlay — dock to top-left after 30s ─────────
const welcomeEl = document.getElementById("welcome");
welcomeEl.addEventListener("click", toggleWelcome);
setTimeout(() => {
  welcomeDocked = true;
  welcomeEl.classList.add("docked");
}, 30000);
</script>
