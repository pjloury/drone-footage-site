<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Drone Footage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    /* ── Video layers ─────────────────────────────────────── */
    #stage {
      position: fixed; inset: 0;
      /* dvh fills the full visual viewport on mobile incl. landscape */
      width: 100dvw; height: 100dvh;
    }

    .layer {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 4s ease-in-out;
    }
    .layer.active { opacity: 1; }

    .layer video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* ── Caption ──────────────────────────────────────────── */
    #caption {
      position: fixed;
      bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      left: calc(24px + env(safe-area-inset-left, 0px));
      z-index: 50;
      color: #fff;
      font-family: 'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 400; letter-spacing: 0.04em;
      text-shadow: 0 1px 4px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.6);
      pointer-events: none;
      transition: opacity 0.6s ease-in-out;
    }
    #caption.fade { opacity: 0; }

    /* Portrait: smaller caption, raised to clear the contact button below */
    @media (orientation: portrait) {
      #caption {
        font-size: clamp(1rem, 5vw, 1.4rem);
        bottom: calc(84px + env(safe-area-inset-bottom, 0px));
      }
      #hint { display: none; }
    }

    /* Landscape mobile: compact caption, respect safe areas */
    @media (orientation: landscape) and (max-height: 500px) {
      #caption {
        font-size: clamp(0.85rem, 2.5vh, 1.2rem);
        bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      }
      #dots { bottom: calc(8px + env(safe-area-inset-bottom, 0px)); }
    }

    /* ── Progress dots ────────────────────────────────────── */
    #dots {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 50; display: flex; gap: 8px;
      pointer-events: none;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,.25);
      transition: background .4s, transform .4s, opacity .4s;
    }
    .dot.active { background: rgba(255,255,255,.85); transform: scale(1.4); }

    /* ── Arrow hint ───────────────────────────────────────── */
    #hint {
      position: fixed;
      bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      right: calc(44px + env(safe-area-inset-right, 0px));
      z-index: 50;
      color: rgba(255,255,255,.35);
      font-size: clamp(.6rem, 1.1vw, .8rem); letter-spacing: .14em;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    #hint.hidden { opacity: 0; }

    /* ── Get in touch button ──────────────────────────────── */
    #contact {
      position: fixed;
      bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      right: calc(44px + env(safe-area-inset-right, 0px));
      z-index: 50;

      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 22px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(14px) saturate(1.6) brightness(1.08);
      -webkit-backdrop-filter: blur(14px) saturate(1.6) brightness(1.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(0,0,0,0.12),
        0 4px 16px rgba(0,0,0,0.22),
        0 1px 4px rgba(0,0,0,0.15);

      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(0.65rem, 1.1vw, 0.8rem);
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: default;
      user-select: none;

      transition:
        background 0.4s ease,
        border-color 0.4s ease,
        box-shadow 0.4s ease;
    }

    #contact:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),
        inset 0 -1px 0 rgba(0,0,0,0.08),
        0 8px 28px rgba(0,0,0,0.28),
        0 2px 8px rgba(0,0,0,0.18);
    }

    /* Label */
    #contact-label {
      color: rgba(255,255,255,0.82);
      transition: opacity 0.3s ease;
    }
    #contact:hover #contact-label { opacity: 0; }

    /* Email — crossfades over the label on hover */
    #contact-email {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.95);
      letter-spacing: 0.07em;
      text-transform: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      user-select: text;
    }
    #contact:hover #contact-email {
      opacity: 1;
      pointer-events: auto;
    }

    @media (orientation: portrait) {
      #contact {
        right: auto;
        left: calc(24px + env(safe-area-inset-left, 0px));
        bottom: calc(34px + env(safe-area-inset-bottom, 0px));
        font-size: clamp(0.6rem, 3vw, 0.75rem);
      }
    }
    @media (orientation: landscape) and (max-height: 500px) {
      #contact {
        bottom: calc(34px + env(safe-area-inset-bottom, 0px));
        font-size: clamp(0.55rem, 2vh, 0.7rem);
        padding: 8px 16px;
      }
    }

    /* ── Progress bar ─────────────────────────────────────── */
    #bar-track {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 4px;
      background: rgba(255,255,255,.12);
      z-index: 50; pointer-events: none;
    }
    #bar {
      height: 100%; width: 0%;
      background: rgba(255,255,255,.55);
      transition: width 0.25s linear;
    }

    /* ── Welcome overlay ─────────────────────────────────── */
    #welcome {
      position: fixed; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;

      /* centered hero state */
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: top left;

      transition:
        top 1.5s cubic-bezier(0.77, 0, 0.175, 1),
        left 1.5s cubic-bezier(0.77, 0, 0.175, 1),
        transform 1.5s cubic-bezier(0.77, 0, 0.175, 1);
    }

    #welcome.docked {
      top: calc(24px + env(safe-area-inset-top, 0px));
      left: calc(24px + env(safe-area-inset-left, 0px));
      transform: translate(0, 0) scale(0.32);
    }

    @media (max-width: 768px) {
      /* translate(-30%,-30%) + scale(0.6) centres the element at 50vw/50vh
         when transform-origin is top left (compensates for the scale shrink) */
      #welcome:not(.docked) {
        transform: translate(-30%, -30%) scale(0.6);
      }
      #welcome.docked {
        transform: translate(0, 0) scale(0.38);
      }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      /* same centering fix for scale(0.45): -50%*(0.45) = -22.5% */
      #welcome:not(.docked) {
        transform: translate(-22.5%, -22.5%) scale(0.45);
      }
      #welcome.docked {
        transform: translate(0, 0) scale(0.26);
      }
    }

    .welcome-box {
      display: inline-flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,0.75);
      padding: clamp(32px, 5.5vw, 64px) clamp(40px, 8vw, 96px);
      gap: 20px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px) saturate(1.4);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 8px 32px rgba(0,0,0,0.35),
        0 2px 8px rgba(0,0,0,0.25);
      transition:
        background 1.2s ease,
        box-shadow 1.2s ease,
        border-color 1.2s ease;
    }

    #welcome.docked .welcome-box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border-color: rgba(255,255,255,0.55);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.1),
        0 4px 20px rgba(0,0,0,0.4),
        0 1px 4px rgba(0,0,0,0.3);
    }

    .welcome-name {
      font-family: 'Cormorant Garamond', 'Didot', 'Bodoni MT', 'Playfair Display', 'Times New Roman', serif;
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      color: #fff;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.4);
      white-space: nowrap;
    }
    .welcome-sub {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(0.85rem, 1.8vw, 1.2rem);
      font-weight: 300;
      letter-spacing: 0.38em;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 1px 8px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.35);
      white-space: nowrap;
    }

    /* ── Loading spinner (shown while first video buffers) ── */
    #spinner {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      transition: opacity .8s ease;
    }
    #spinner.gone { opacity: 0; pointer-events: none; }
    .ring {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: rgba(255,255,255,.7);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="welcome">
  <div class="welcome-box">
    <div class="welcome-name">PJ Loury</div>
    <div class="welcome-sub">Drone Videography</div>
  </div>
</div>

<div id="spinner"><div class="ring"></div></div>

<div id="stage">
  <div class="layer" id="layerA"><video id="vidA" playsinline muted preload="auto"></video></div>
  <div class="layer" id="layerB"><video id="vidB" playsinline muted preload="auto"></video></div>
</div>

<div id="caption"></div>
<div id="dots"></div>
<div id="hint">← &nbsp;&nbsp; → &nbsp; to navigate</div>
<div id="contact">
  <span id="contact-label">Get in touch</span>
  <span id="contact-email">pjloury@gmail.com</span>
</div>
<div id="bar-track"><div id="bar"></div></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════════════

// Base URL of your Cloudflare R2 public bucket
// e.g. "https://pub-abc123.r2.dev"  (no trailing slash)
const BASE_URL = "https://pub-abee44b9f56049338f38452f0835b88f.r2.dev";

const VIDEOS = [
  // { file: "video-01.mp4", caption: "Woodside Mansion"                  },
  { file: "video-02.mp4", caption: "Good Morning Stanford"              },
  { file: "video-03.mp4", caption: "Snowy Tahoe Treetops"               },
  { file: "video-04.mp4", caption: "Carmel Waves at Dusk"               },
  { file: "video-05.mp4", caption: "Financial District"                 },

  { file: "video-15.mp4", caption: "Wailea, Maui"                       },

  { file: "video-24.mp4", caption: "Mont Saint-Michel, France"          },
  // { file: "video-25.mp4", caption: "Home on Christmas"                  },
  { file: "video-26.mp4", caption: "Salzburg, Austria"                  },
  { file: "video-27.mp4", caption: "Park City Morning, Utah"            },
  // { file: "video-28.mp4", caption: "Flex"                               },
  { file: "video-29.mp4", caption: "Canyonlands National Park"          },
  { file: "video-30.mp4", caption: "Vogelsang Lake, Yosemite"           },
  { file: "video-31.mp4", caption: "Austria"                            },
  { file: "video-32.mp4", caption: "Almaden Green"                      },
  { file: "video-33.mp4", caption: "Mont Saint-Michel"                  },
  { file: "video-34.mp4", caption: "SF Lunar New Year"                  },
  { file: "video-35.mp4", caption: "Big Sur Hills"                      },
  { file: "video-36.mp4", caption: "Fort Funston"                       },
  { file: "video-37.mp4", caption: "Fort Funston & Golden Gate"         },
  { file: "video-38.mp4", caption: "LA Suburbs"                         },
  { file: "video-39.mp4", caption: "Mont Saint-Michel"                  },
  { file: "video-40.mp4", caption: "Neuschwanstein Castle, Germany"     },
  { file: "video-41.mp4", caption: "Park City, Utah"                    },
  { file: "video-42.mp4", caption: "Golden Gate Bridge"                 },
  { file: "video-43.mp4", caption: "Balearic Islands, Spain"            },
  { file: "video-44.mp4", caption: "Mont Saint-Michel"                  },
  { file: "video-45.mp4", caption: "Drifting Away"                      },
  { file: "video-46.mp4", caption: "Laguna de los Tres, Patagonia"      },
  { file: "video-47.mp4", caption: "Canyonlands"                        },
  { file: "video-48.mp4", caption: "Ka\u02bbanapali Surf, Maui"         },
  { file: "video-49.mp4", caption: "Copacabana, Brazil"                 },
  { file: "video-50.mp4", caption: "Palma, Mallorca"                    },
  { file: "video-51.mp4", caption: "Fuschl am See, Austria"             },
  { file: "video-52.mp4", caption: "Moab, Utah"                         },
  { file: "video-53.mp4", caption: "Carmel-by-the-Sea"                  },
  { file: "video-54.mp4", caption: "Garrapata State Park"               },
  { file: "video-55.mp4", caption: "Arches National Park"               },
  { file: "video-56.mp4", caption: "Wailea South, Maui"                 },
  { file: "video-57.mp4", caption: "Red Rocks"                          },
  { file: "video-58.mp4", caption: "Bonneville Salt Flats"              },
  { file: "video-59.mp4", caption: "UC Berkeley Campus"                 },
  { file: "video-60.mp4", caption: "SF Embarcadero"                     },
  { file: "video-61.mp4", caption: "Stanford Main Quad"                 },
  { file: "video-62.mp4", caption: "Sather Tower, Berkeley"             },
];

const CROSSFADE_MS = 4000;

// ═══════════════════════════════════════════════════════════
//  Engine
// ═══════════════════════════════════════════════════════════

const layerA   = document.getElementById("layerA");
const layerB   = document.getElementById("layerB");
const vidA     = document.getElementById("vidA");
const vidB     = document.getElementById("vidB");
const caption  = document.getElementById("caption");
const dotsEl   = document.getElementById("dots");
const hintEl   = document.getElementById("hint");
const barEl    = document.getElementById("bar");
const spinner  = document.getElementById("spinner");

let current       = 0;
let transitioning = false;
let hintDismissed = false;
let front         = "A"; // which layer is currently showing

// Expose testability globals — read/write surface for unit and DOM tests
window.VIDEOS       = VIDEOS;
window.CROSSFADE_MS = CROSSFADE_MS;
window.MAX_DOTS     = 9;    // set before buildDots() runs; matches const below
window.HALF_DOTS    = 4;    // Math.floor(9 / 2)
Object.defineProperty(window, 'current', {
  get() { return current; },
  set(v) { current = v; },
  configurable: true,
});
Object.defineProperty(window, 'transitioning', {
  get() { return transitioning; },
  set(v) { transitioning = v; },
  configurable: true,
});
Object.defineProperty(window, 'front', {
  get() { return front; },
  set(v) { front = v; },
  configurable: true,
});

function url(i) { return `${BASE_URL}/${VIDEOS[i].file}`; }

function frontVid()   { return front === "A" ? vidA : vidB; }
function frontLayer() { return front === "A" ? layerA : layerB; }
function backVid()    { return front === "A" ? vidB : vidA; }
function backLayer()  { return front === "A" ? layerB : layerA; }

const MAX_DOTS  = 9;
const HALF_DOTS = Math.floor(MAX_DOTS / 2);

function buildDots() {
  dotsEl.innerHTML = "";
  for (let i = 0; i < MAX_DOTS; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i === HALF_DOTS ? " active" : "");
    dotsEl.appendChild(d);
  }
}
function updateDots() {
  const total = VIDEOS.length;
  [...dotsEl.querySelectorAll(".dot")].forEach((d, slot) => {
    const idx  = current - HALF_DOTS + slot;
    const dist = Math.abs(slot - HALF_DOTS);
    const inRange = idx >= 0 && idx < total;
    d.classList.toggle("active", slot === HALF_DOTS);
    d.style.opacity = inRange
      ? (dist === 0 ? "1" : dist <= 1 ? "0.6" : "0.3")
      : "0";
  });
}
function updateBar(vid) {
  if (vid.duration) barEl.style.width = (vid.currentTime / vid.duration * 100) + "%";
}
function resetBar() { barEl.style.width = "0%"; }

// Pre-buffer next video into back layer quietly
function preloadNext() {
  const nextIdx = (current + 1) % VIDEOS.length;
  const bv = backVid();
  if (bv.src.includes(VIDEOS[nextIdx].file)) return; // already loaded
  bv.ontimeupdate = null;
  bv.onended = null;
  bv.src = url(nextIdx);
  bv.preload = "auto";
  bv.load();
}
function preloadPrev() {
  const prevIdx = (current - 1 + VIDEOS.length) % VIDEOS.length;
  const bv = backVid();
  if (bv.src.includes(VIDEOS[prevIdx].file)) return; // already loaded
  bv.ontimeupdate = null;
  bv.onended = null;
  bv.src = url(prevIdx);
  bv.preload = "auto";
  bv.load();
}

function goTo(index) {
  if (transitioning) return;
  transitioning = true;
  resetBar();

  const goingBackward = index < current;
  current = ((index % VIDEOS.length) + VIDEOS.length) % VIDEOS.length;

  // Grab refs before flip
  const incoming      = backVid();
  const incomingLayer = backLayer();
  const outgoing      = frontVid();
  const outgoingLayer = frontLayer();

  // Kill outgoing handlers IMMEDIATELY — prevents preloadNext() from
  // clobbering the incoming video's src while it's trying to load
  outgoing.ontimeupdate = null;
  outgoing.onended      = null;

  // Clear stale handlers on incoming
  incoming.ontimeupdate = null;
  incoming.onended      = null;

  // Load if not already preloaded
  if (!incoming.src.includes(VIDEOS[current].file)) {
    incoming.src     = url(current);
    incoming.preload = "auto";
    incoming.load();
  }

  // Flip front/back tracking
  front = front === "A" ? "B" : "A";

  // START THE VISUAL TRANSITION IMMEDIATELY (feels responsive)
  // Outgoing starts fading out right away regardless of load state
  caption.classList.add("fade");
  updateDots();
  setTimeout(() => outgoingLayer.classList.remove("active"), 50);

  // Watchdog: skip broken/stuck video after 5s
  const watchdog = setTimeout(() => {
    if (!transitioning) return;
    incoming.removeEventListener("canplay", doTransition);
    transitioning = false;
    goTo(current + 1);
  }, 5000);

  function doTransition() {
    clearTimeout(watchdog);
    incoming.play().catch(() => {});
    incomingLayer.classList.add("active");

    // Caption fades in halfway through
    setTimeout(() => {
      caption.textContent = VIDEOS[current].caption;
      caption.classList.remove("fade");
    }, CROSSFADE_MS / 2);

    setTimeout(() => {
      outgoing.pause();
      incoming.ontimeupdate = () => {
        updateBar(incoming);
        if (incoming.duration && (incoming.duration - incoming.currentTime) < 8) {
          preloadNext();
        }
      };
      incoming.onended = () => goTo(current + 1);
      if (goingBackward) preloadPrev();
      transitioning = false;
    }, CROSSFADE_MS + 100);
  }

  if (incoming.readyState >= 3) {
    doTransition();
  } else {
    incoming.addEventListener("canplay", doTransition, { once: true });
  }
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

// Expose engine functions for tests
window.goTo        = goTo;
window.preloadNext = preloadNext;
window.backVid     = backVid;
window.frontVid    = frontVid;

// ── keyboard / swipe ──────────────────────────────────────
// ── Welcome overlay toggle ────────────────────────────────
let welcomeDocked = false;
function toggleWelcome() {
  welcomeDocked = !welcomeDocked;
  welcomeEl.classList.toggle("docked", welcomeDocked);
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") { dismissHint(); next(); }
  if (e.key === "ArrowLeft")  { dismissHint(); prev(); }
  if (e.key === "ArrowUp" || e.key === "ArrowDown") { e.preventDefault(); toggleWelcome(); }
});

let touchX = null;
let touchY = null;
document.addEventListener("touchstart", e => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchend", e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 35) {
    // vertical swipe — toggle welcome overlay
    toggleWelcome();
  } else if (Math.abs(dx) > 35) {
    dismissHint();
    dx < 0 ? next() : prev();
  }
  touchX = null;
  touchY = null;
}, { passive: true });

function dismissHint() {
  if (!hintDismissed) { hintDismissed = true; hintEl.classList.add("hidden"); }
}
setTimeout(dismissHint, 5000);

// ── shuffle ───────────────────────────────────────────────
(function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
})(VIDEOS);

// ── init ──────────────────────────────────────────────────
function init() {
  buildDots();

  // Set up first video on layer A
  vidA.src = url(0);
  vidA.muted = true;
  vidA.playsInline = true;
  vidA.preload = "auto";
  vidA.load();

  let started = false;
  function begin() {
    if (started) return;
    started = true;
    spinner.classList.add("gone");
    layerA.classList.add("active");
    vidA.play().catch(() => {});
    caption.textContent = VIDEOS[0].caption;
    vidA.ontimeupdate = () => {
      updateBar(vidA);
      if (vidA.duration && (vidA.duration - vidA.currentTime) < 8) preloadNext();
    };
    vidA.onended = () => goTo(current + 1);
  }

  vidA.addEventListener("canplay", begin, { once: true });
  setTimeout(() => { spinner.classList.add("gone"); begin(); }, 6000);
}

init();

// ── Welcome overlay — dock to top-left after 30s ─────────
const welcomeEl = document.getElementById("welcome");
welcomeEl.addEventListener("click", toggleWelcome);
setTimeout(() => {
  welcomeDocked = true;
  welcomeEl.classList.add("docked");
}, 30000);
</script>
