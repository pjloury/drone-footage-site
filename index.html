<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PJ Loury Videography</title>

  <!-- Open Graph / iMessage link preview -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="PJ Loury — Drone Videography" />
  <meta property="og:description" content="Aerial cinematography from around the world." />
  <meta property="og:image"       content="https://drones.pjloury.com/og-image.jpg" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url"         content="https://drones.pjloury.com" />

  <!-- Twitter / X card (also used by iMessage on newer iOS) -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="PJ Loury — Drone Videography" />
  <meta name="twitter:description" content="Aerial cinematography from around the world." />
  <meta name="twitter:image"       content="https://drones.pjloury.com/og-image.jpg" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Google Cast sender SDK — no-op in non-Chrome browsers -->
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    /* ── Video layers ─────────────────────────────────────── */
    #stage {
      position: fixed; inset: 0;
      /* dvh fills the full visual viewport on mobile incl. landscape */
      width: 100dvw; height: 100dvh;
    }

    .layer {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 4s ease-in-out;
    }
    .layer.active { opacity: 1; }

    .layer video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* ── Caption ──────────────────────────────────────────── */
    #caption {
      position: fixed;
      bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      left: calc(24px + env(safe-area-inset-left, 0px));
      z-index: 50;
      color: #fff;
      font-family: 'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 400; letter-spacing: 0.04em;
      text-shadow: 0 1px 4px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.6);
      pointer-events: none;
      transition: opacity 0.6s ease-in-out;
    }
    #caption.fade { opacity: 0; }

    /* Portrait: smaller caption */
    @media (orientation: portrait) {
      #caption {
        font-size: clamp(1rem, 5vw, 1.4rem);
        bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      }
    }

    /* Landscape mobile: compact caption, respect safe areas */
    @media (orientation: landscape) and (max-height: 500px) {
      #caption {
        font-size: clamp(0.85rem, 2.5vh, 1.2rem);
        bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      }
      #dots { bottom: calc(8px + env(safe-area-inset-bottom, 0px)); }
    }

    /* ── Progress dots ────────────────────────────────────── */
    #dots {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 50; display: flex; gap: 8px;
      pointer-events: none;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,.25);
      transition: background .4s, transform .4s, opacity .4s;
    }
    .dot.active { background: rgba(255,255,255,.85); transform: scale(1.4); }

    /* ── Edge nav arrows (liquid glass) ───────────────────── */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 60;
      width: 56px;
      height: 50vh;
      max-height: 420px;
      min-height: 220px;
      border: none;
      padding: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 1;
      transition: opacity 1.2s ease, background 0.3s ease;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.18),
        0 12px 36px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.22);
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* Tapered inner edge — outer edge flush to the screen */
    #nav-left  { left: 0;  clip-path: polygon(0 0, 100% 15%, 100% 85%, 0 100%); }
    #nav-right { right: 0; clip-path: polygon(0 15%, 100% 0, 100% 100%, 0 85%); }
    .nav-arrow:hover, .nav-arrow:active {
      background: rgba(255,255,255,0.16);
    }
    .nav-arrow.hidden { opacity: 0; pointer-events: none; }

    /* Gesture-feedback flash. When the user taps an edge / hits an
       arrow key / swipes / presses a D-pad direction, the matching
       arrow plays this animation: quick fade-in (240ms) → hold
       through the load + start of crossfade → soft fade-out (~1s).
       Animation values override the static .hidden opacity:0 only
       while running, so onboarding state is preserved afterwards. */
    @keyframes nav-flash {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      55%  { opacity: 1; }
      100% { opacity: 0; }
    }
    .nav-arrow.flash { animation: nav-flash 2400ms ease-out; }
    .nav-arrow svg {
      width: 28px; height: 28px;
      stroke: rgba(255,255,255,0.9);
      stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
      fill: none;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
    }
    /* Slight inward bias so the chevron sits closer to the screen edge,
       making the visual weight feel anchored to the edge of the device */
    #nav-left  svg { transform: translateX(-4px); }
    #nav-right svg { transform: translateX(4px); }

    @media (orientation: portrait) {
      .nav-arrow { width: 44px; height: 42vh; min-height: 180px; }
      .nav-arrow svg { width: 22px; height: 22px; }
    }
    @media (orientation: landscape) and (max-height: 500px) {
      .nav-arrow { height: 70vh; min-height: 140px; max-height: none; }
    }


    /* ── Progress bar ─────────────────────────────────────── */
    #bar-track {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 4px;
      background: rgba(255,255,255,.12);
      z-index: 50; pointer-events: none;
    }
    #bar {
      height: 100%; width: 0%;
      background: rgba(255,255,255,.55);
      transition: width 0.25s linear;
    }

    /* ── Welcome overlay ─────────────────────────────────── */
    #welcome {
      position: fixed; z-index: 300;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;

      /* centered hero state */
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: top left;

      transition:
        top 1.5s cubic-bezier(0.77, 0, 0.175, 1),
        left 1.5s cubic-bezier(0.77, 0, 0.175, 1),
        transform 1.5s cubic-bezier(0.77, 0, 0.175, 1);
    }

    #welcome.docked {
      top: calc(24px + env(safe-area-inset-top, 0px));
      left: calc(24px + env(safe-area-inset-left, 0px));
      transform: translate(0, 0) scale(0.32);
    }

    @media (max-width: 768px) {
      /* translate(-30%,-30%) + scale(0.6) centres the element at 50vw/50vh
         when transform-origin is top left (compensates for the scale shrink) */
      #welcome:not(.docked) {
        transform: translate(-30%, -30%) scale(0.6);
      }
      #welcome.docked {
        transform: translate(0, 0) scale(0.38);
      }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      /* same centering fix for scale(0.45): -50%*(0.45) = -22.5% */
      #welcome:not(.docked) {
        transform: translate(-22.5%, -22.5%) scale(0.45);
      }
      #welcome.docked {
        transform: translate(0, 0) scale(0.26);
      }
    }

    .welcome-box {
      display: inline-flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,0.75);
      padding: clamp(32px, 5.5vw, 64px) clamp(40px, 8vw, 96px);
      gap: 20px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px) saturate(1.4);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 8px 32px rgba(0,0,0,0.35),
        0 2px 8px rgba(0,0,0,0.25);
      transition:
        background 1.2s ease,
        box-shadow 1.2s ease,
        border-color 1.2s ease;
    }

    #welcome.docked .welcome-box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border-color: rgba(255,255,255,0.55);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.1),
        0 4px 20px rgba(0,0,0,0.4),
        0 1px 4px rgba(0,0,0,0.3);
    }

    .welcome-name {
      font-family: 'Cormorant Garamond', 'Didot', 'Bodoni MT', 'Playfair Display', 'Times New Roman', serif;
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      color: #fff;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.4);
      white-space: nowrap;
    }
    .welcome-sub {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(0.85rem, 1.8vw, 1.2rem);
      font-weight: 300;
      letter-spacing: 0.38em;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 1px 8px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.35);
      white-space: nowrap;
    }

    /* ── Debug HUD (toggled with ?debug=1) ──────────────────
       Shows realtime playback metrics so you can verify smooth
       buffering / catch stalls in the wild. Visible on phone too —
       open https://drones.pjloury.com/?debug=1 from any device. */
    #debug-hud {
      position: fixed;
      top: calc(16px + env(safe-area-inset-top, 0px));
      left: calc(16px + env(safe-area-inset-left, 0px));
      z-index: 250;
      display: none;
      max-width: calc(100vw - 32px);
      padding: 10px 14px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      border-radius: 10px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
      font-family: 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1.55;
      letter-spacing: 0.02em;
      pointer-events: none;
      white-space: pre;
      tab-size: 2;
    }
    #debug-hud.visible { display: block; }
    #debug-hud .ok    { color: #6ee7b7; }
    #debug-hud .warn  { color: #fcd34d; }
    #debug-hud .bad   { color: #f87171; }

    /* ── Loading spinner (shown while first video buffers) ── */
    #spinner {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      transition: opacity .8s ease;
    }
    #spinner.gone { opacity: 0; pointer-events: none; }
    .ring {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: rgba(255,255,255,.7);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section selector ─────────────────────────────────── */
    #section-btn {
      position: fixed;
      top: calc(20px + env(safe-area-inset-top, 0px));
      right: calc(20px + env(safe-area-inset-right, 0px));
      z-index: 100;
      height: 36px;
      min-width: 36px;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px) saturate(1.4);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.3s, border-color 0.3s, opacity 0.5s;
      opacity: 0; pointer-events: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem; font-weight: 300;
      letter-spacing: 0.07em;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
    }
    #section-btn.visible { opacity: 1; pointer-events: auto; }
    #section-btn:hover, #section-btn.active {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.5);
    }
    #section-btn svg {
      width: 16px; height: 16px;
      stroke: rgba(255,255,255,0.7);
      stroke-width: 2; stroke-linecap: round; fill: none;
      flex-shrink: 0;
    }

    #section-dropdown {
      position: fixed;
      top: calc(64px + env(safe-area-inset-top, 0px));
      right: calc(20px + env(safe-area-inset-right, 0px));
      z-index: 100;
      min-width: 195px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border-radius: 12px;
      padding: 6px 0;
      opacity: 0;
      transform: translateY(-6px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #section-dropdown.open {
      opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
    }
    .section-item {
      display: flex; align-items: center;
      padding: 9px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem; font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      user-select: none; -webkit-user-select: none;
    }
    .section-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
    .section-item.active { color: #fff; font-weight: 400; }
    .section-item.active::before {
      content: ""; display: inline-block;
      width: 5px; height: 5px; border-radius: 50%;
      background: #fff; margin-right: 10px; flex-shrink: 0;
    }
    .section-item.tv-focus { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); outline: none; }
    .section-item:not(.active)::before {
      content: ""; display: inline-block;
      width: 5px; height: 5px; margin-right: 10px; flex-shrink: 0;
    }
    .section-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 4px 14px; }
    .shuffle-icon {
      width: 13px; height: 13px; margin-right: 8px; flex-shrink: 0;
      stroke: currentColor; stroke-width: 2; stroke-linecap: round;
      stroke-linejoin: round; fill: none; vertical-align: -1px;
    }

    /* ── Mini map ─────────────────────────────────────────── */
    #minimap {
      position: fixed;
      bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      right: calc(24px + env(safe-area-inset-right, 0px));
      z-index: 50;
      width: 176px; height: 112px;
      pointer-events: auto; /* absorbs clicks so they don't fall through to nav */
      opacity: 0;
      transition: opacity 1.2s ease;
      /* Frosted-glass tint, very light: the blur does most of the work
         of separating the map from the video below. A faint white tint
         keeps it readable against very bright frames without going
         dark/heavy. No hard border or drop shadow — just a whisper of
         inset highlight. */
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(22px) saturate(1.25);
      -webkit-backdrop-filter: blur(22px) saturate(1.25);
      border: none;
      border-radius: 12px;
      /* No box-shadow inset — the mask-image contour is the natural
         border. An inset highlight would just trace a redundant 1 px
         line inside the silhouette. */
      overflow: hidden;
      /* Animate the shape change when switching between US (rounded
         rectangle) and World (ellipse — looks like a globe). */
      transition: opacity 1.2s ease, border-radius 1.0s ease;
    }
    #minimap.visible { opacity: 1; }

    /* Plate shape per active map. mask-image is alpha-driven —
       white SVG paths reveal the plate, transparent areas hide it.
       World uses a chubby 1.6:1 ellipse (instead of border-radius:50%
       on the container, which pinches to 0 height at the horizontal
       extremes and clips New Zealand / far-east Russia). */
    #minimap.world {
      border-radius: 0;
      mask: url(/maps/world-mask.svg) center / contain no-repeat;
      -webkit-mask: url(/maps/world-mask.svg) center / contain no-repeat;
      /* World viewBox is 360×139.6 (2.58:1). Size the plate to that exact
         aspect so there's no dead space above/below the map. */
      width: 214px; height: 83px;
    }
    #minimap-dots.world {
      width: 214px; height: 83px;
    }
    #minimap.us {
      border-radius: 0;
      mask: url(/maps/us-mask.svg) center / contain no-repeat;
      -webkit-mask: url(/maps/us-mask.svg) center / contain no-repeat;
    }
    #minimap.ca {
      border-radius: 0;
      mask: url(/maps/ca-mask.svg) center / contain no-repeat;
      -webkit-mask: url(/maps/ca-mask.svg) center / contain no-repeat;
    }
    #minimap.bay {
      border-radius: 0;
      mask: url(/maps/bay-mask.svg) center / contain no-repeat;
      -webkit-mask: url(/maps/bay-mask.svg) center / contain no-repeat;
    }
    #minimap.europe {
      border-radius: 0;
      mask: url(/maps/europe-mask.svg) center / contain no-repeat;
      -webkit-mask: url(/maps/europe-mask.svg) center / contain no-repeat;
      width: 200px; height: 110px;
    }
    #minimap-dots.europe {
      width: 200px; height: 110px;
    }
    /* California's only path is the state outline itself — drawing a
       stroke around it would just trace the mask edge a second time,
       producing the "two borders" effect. Suppress fill+stroke so the
       contour is the sole visible boundary. */
    #map-ca .map-land { fill: none; stroke: none; }

    /* ── Dot overlay (lives OUTSIDE #minimap so it isn't clipped by
       the mask). Sibling element pinned to the same anchor + size,
       higher z-index, no mask. Each map has its own SVG with the
       matching viewBox so projection coords place the dot at the
       same pixel as the masked landmass below. */
    #minimap-dots {
      position: fixed;
      bottom: calc(44px + env(safe-area-inset-bottom, 0px));
      right: calc(24px + env(safe-area-inset-right, 0px));
      z-index: 51;
      width: 176px; height: 112px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    /* Allow clicks through to map pin groups only */
    #minimap-dots .dot-svg { pointer-events: none; }
    #minimap-dots .map-pin-group { pointer-events: auto; }
    #minimap-dots.visible { opacity: 1; }
    .dot-svg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      height: auto;
      overflow: visible;
      transition: opacity 1.2s ease;
    }
    .dot-svg.hidden { opacity: 0; }
    #dot-us      { width: 176px; }
    #dot-world   { width: 214px; }
    #dot-ca      { width: 106px; }
    #dot-bay     { width: 132px; }
    #dot-europe  { width: 200px; }
    .map-svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: auto;
      transition: opacity 1.2s ease;
      overflow: visible;
    }
    .map-svg.hidden { opacity: 0; }
    /* Sized to fill the matching contour with minimal padding inside
       the 152×96 plate. Heights are auto so each viewBox keeps its
       aspect ratio. */
    #map-us      { width: 176px; }
    #map-world   { width: 214px; }
    #map-ca      { width: 106px; }   /* ~96% of plate height */
    #map-bay     { width: 132px; }   /* height-bound to plate (Bay aspect ~1.18) */
    #map-europe  { width: 200px; }   /* Europe viewBox 40×22 → aspect 1.82 */
    /* Land + state/country borders. fill/stroke cascade from the <g>
       wrapper to its <path> children; vector-effect keeps stroke width
       constant (in px) regardless of the SVG viewBox, so the new
       higher-resolution US map (viewBox 585×255) renders legibly at
       the small thumbnail size. */
    .map-land {
      fill: rgba(255,255,255,0.13);
      stroke: rgba(255,255,255,0.58);
      stroke-width: 0.6;
      stroke-linejoin: round;
    }
    .map-land path { vector-effect: non-scaling-stroke; }
    /* GPS dot (Apple Maps blue + white ring + cyan glow) */
    .map-pin {
      fill: rgba(255,255,255,0.88);
      transition: fill 0.15s;
      pointer-events: none; /* hit target is the sibling transparent circle */
    }
    .map-pin-group {
      cursor: pointer;
      pointer-events: auto;
    }
    .map-pin-group:hover .map-pin { fill: #fff; }
    /* Map pin tooltip */
    #map-tooltip {
      position: fixed;
      z-index: 200;
      pointer-events: none;
      padding: 5px 10px;
      border-radius: 10px;
      background: rgba(30,30,40,0.55);
      backdrop-filter: blur(14px) saturate(1.6);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      font-family: 'Inter', 'SF Pro Display', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    #map-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .map-dot {
      fill: #4a9eff;
      stroke: rgba(255,255,255,0.98);
      stroke-width: 0.8;

  if (!absUrl || typeof performance === "undefined" || !performance.getEntriesByName) return null;

    const e = entries[entries.length - 1];
    if (!e || e.entryType !== "resource") return null;

      durationMs: Math.round(e.duration),
      transferSize: e.transferSize,

  if (http === 403 || http === 404) return "edge_http_status";

  if (code === 4) return "browser_codec_or_container";
  if (code === 2) return "network_load";
  if (code === 1) return "aborted_or_detach";
  if (ev.name === "stalled" || ev.name === "waiting") return "buffering_or_throughput";
  if (ev.name === "play_rejected") return "browser_autoplay_or_policy";

  else if (/Android/i.test(ua))                       $os = "Android";
  else if (/Mac OS X/i.test(ua))                      $os = "macOS";
  else if (/Windows/i.test(ua))                       $os = "Windows";
  else if (/Linux/i.test(ua))                         $os = "Linux";

  return {
    $browser,
    $os,
    $device_type: isTablet ? "tablet" : isMobile ? "mobile" : "desktop",
  };
}

const DEVICE_CONTEXT = getDeviceContext();

function frontVid()   { return front === "A" ? vidA : vidB; }
function frontLayer() { return front === "A" ? layerA : layerB; }
function backVid()    { return front === "A" ? vidB : vidA; }
function backLayer()  { return front === "A" ? layerB : layerA; }

const MAX_DOTS  = 9;
const HALF_DOTS = Math.floor(MAX_DOTS / 2);

function buildDots() {
  dotsEl.innerHTML = "";
  for (let i = 0; i < MAX_DOTS; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i === HALF_DOTS ? " active" : "");
    dotsEl.appendChild(d);
  }
}
function updateDots() {
  const total = VIDEOS.length;
  [...dotsEl.querySelectorAll(".dot")].forEach((d, slot) => {
    const idx  = current - HALF_DOTS + slot;
    const dist = Math.abs(slot - HALF_DOTS);
    const inRange = idx >= 0 && idx < total;
    d.classList.toggle("active", slot === HALF_DOTS);
    d.style.opacity = inRange
      ? (dist === 0 ? "1" : dist <= 1 ? "0.6" : "0.3")
      : "0";
  });
}
function updateBar(vid) {
  if (vid.duration) barEl.style.width = (vid.currentTime / vid.duration * 100) + "%";
}
function resetBar() { barEl.style.width = "0%"; }

function clearGoToLoad() {
  if (activeGoToAbort) {
    try { activeGoToAbort.abort(); } catch (_) {}
    activeGoToAbort = null;
  }
  if (activeGoToWatchdog != null) {
    clearTimeout(activeGoToWatchdog);
    activeGoToWatchdog = null;
  }
  if (mobileAutoSkipTimer != null) {
    clearTimeout(mobileAutoSkipTimer);
    mobileAutoSkipTimer = null;
  }
  freezeStartMs = null;
  _wd.lastCT       = null;
  _wd.frozenSince  = null;
  _wd.telemetrySent = false;
}

// Pre-buffer next video into back layer quietly
function preloadNext() {
  const nextIdx = (current + 1) % VIDEOS.length;
  const bv = backVid();
  if (bv.src.includes(videoFilename(nextIdx))) return; // already loaded
  bv.ontimeupdate = null;
  bv.onended = null;
  bv.dataset.clipIndex = String(nextIdx);
  setVideoSrc(bv, nextIdx);
}
function preloadPrev() {
  const prevIdx = (current - 1 + VIDEOS.length) % VIDEOS.length;
  const bv = backVid();
  if (bv.src.includes(videoFilename(prevIdx))) return; // already loaded
  bv.ontimeupdate = null;
  bv.onended = null;
  bv.dataset.clipIndex = String(prevIdx);
  setVideoSrc(bv, prevIdx);
}

function safePlay(video, context) {
  return video.play().catch((err) => {
    const abs = video.currentSrc || video.src;
    const rt = resourceTimingForUrl(abs);
    queueTelemetry({
      name: "play_rejected",
      context,
      message: err && err.message ? err.message : String(err),
      rootHint: "browser_autoplay_or_policy",
      ...clipPayloadFromVideo(video),
      resourceTiming: rt,
      resourceHttpStatus: rt && rt.responseStatus,
    });
  });
}

function recoverFromClipError(video, source) {
  allowErrorRecovery = true;
  if (consecutiveAutoSkips >= MAX_AUTO_SKIPS) {
    queueTelemetry({
      name: "recover_cap",
      source,
      rootHint: "unknown",
      ...clipPayloadFromVideo(video),
    });
    return;
  }
  if (video.dataset.clipIndex === "0") {
    suppressInitialBegin = true;
    spinner.classList.add("gone");
  }
  consecutiveAutoSkips++;
  clearGoToLoad();
  transitioning = false;
  queueTelemetry({
    name: "recover_skip",
    source,
    rootHint: "unknown",
    ...clipPayloadFromVideo(video),
  });
  goTo(current + 1, { force: true });
}

function onVideoError(e) {
  const v = e.target;
  const me = v.error;
  const abs = v.currentSrc || v.src;
  const rt = resourceTimingForUrl(abs);
  const mediaErrorCode = me ? me.code : null;
  const mediaErrorMessage = me ? me.message : "";
  queueTelemetry({
    name: "video_error",
    mediaErrorCode,
    mediaErrorMessage,
    rootHint: inferRootHint({
      name: "video_error",
      mediaErrorCode,
      resourceHttpStatus: rt && rt.responseStatus,
    }),
    isFront: v === frontVid(),
    transitioning,
    preBootstrap: !allowErrorRecovery,
    ...clipPayloadFromVideo(v),
    resourceTiming: rt,
    resourceHttpStatus: rt && rt.responseStatus,
  });

  if (!allowErrorRecovery) return;
  // Avoid skipping the whole slideshow on spurious early errors (e.g. code 4 before any
  // buffer). Still recover for true network failures (typically code 2) even at readyState 0.
  if (mediaErrorCode === 1) return;
  if (v.readyState < 2 && mediaErrorCode !== 2) {
    queueTelemetry({
      name: "video_error_ignored_prebuffer",
      mediaErrorCode,
      rootHint: inferRootHint({
        name: "video_error",
        mediaErrorCode,
        resourceHttpStatus: rt && rt.responseStatus,
      }),
      ...clipPayloadFromVideo(v),
    });
    return;
  }
  if (v !== frontVid() && !transitioning) {
    return;
  }
  recoverFromClipError(v, "media_error");
}

let stallLogTimer = null;
function onStalled(e) {
  if (stallLogTimer) return;
  stallLogTimer = setTimeout(() => {
    stallLogTimer = null;
    const v = e.target;
    const abs = v.currentSrc || v.src;
    const rt = resourceTimingForUrl(abs);
    queueTelemetry({
      name: "stalled",
      rootHint: "buffering_or_throughput",
      ...clipPayloadFromVideo(v),
      resourceTiming: rt,
      resourceHttpStatus: rt && rt.responseStatus,
    });
  }, 2500);
}

function onWaiting(e) {
  const v = e.target;
  if (v !== frontVid()) return;
  const abs = v.currentSrc || v.src;
  const rt = resourceTimingForUrl(abs);
  queueTelemetry({
    name: "waiting",
    rootHint: "buffering_or_throughput",
    ...clipPayloadFromVideo(v),
    resourceTiming: rt,
    resourceHttpStatus: rt && rt.responseStatus,
  });

  // Track freeze start (used by the playing handler to measure duration)
  if (!freezeStartMs) freezeStartMs = Date.now();

  // Mobile: already at lowest quality tier — no encode to fall back to.
  // If the video stays frozen for 8 s, skip to the next clip rather than
  // leaving the user staring at a stuck frame indefinitely.
  if (IS_MOBILE && !mobileAutoSkipTimer && !transitioning && v.currentTime > 1.0) {
    const frozeAt = freezeStartMs;
    mobileAutoSkipTimer = setTimeout(() => {
      mobileAutoSkipTimer = null;
      if (v !== frontVid() || transitioning) return;
      queueTelemetry({
        name: "video_freeze_skip",
        durationMs: Math.round(Date.now() - frozeAt),
        ...clipPayloadFromVideo(v),
      });
      goTo(current + 1);
    }, 8000);
  }

  // Mid-playback quality fallback — if the front video stalls after the
  // first second of playback (past the initial-load zone covered by the
  // 2.5 s timer inside goTo()), silently swap to the mobile-quality encode
  // from the same timestamp.  Catches two separate root causes:
  //   • CDN cold-cache misses: pub-*.r2.dev has no guaranteed edge warming;
  //     on a first request the byte stream from R2 origin may be slower than
  //     the clip's bitrate, exhausting the initial buffer mid-way through.
  //   • 60 fps VBR spikes: 60 fps source clips encoded at 5 Mbps can hit the
  //     maxrate ceiling mid-scene, causing the decoder to starve briefly.
  // In both cases the mobile encode (H.264 1080p @ 5 Mbps, lower overhead)
  // resumes from the same position without the user having to navigate away.
  if (!transitioning && !IS_MOBILE && !degradedClips.has(current) && v.currentTime > 1.0) {
    const clipIdx   = current;       // stable closure — current may change during async ops
    const savedTime = v.currentTime;
    degradedClips.add(clipIdx);

    queueTelemetry({
      name: "quality_fallback_midplay",
      rootHint: "buffering_or_throughput",
      savedTime,
      ...clipPayloadFromVideo(v),
    });

    // Preserve live playback handlers; restore them after the seek lands.
    const savedOntimeupdate = v.ontimeupdate;
    const savedOnended      = v.onended;
    v.ontimeupdate = null;
    v.onended      = null;

    // Swap source — url() now returns the mobile URL because clipIdx ∈ degradedClips.
    v.src = url(clipIdx);
    v.load();

    // Seek to the saved position once the new file's metadata is ready.
    v.addEventListener("loadedmetadata", () => {
      if (v.duration && savedTime < v.duration) v.currentTime = savedTime;
    }, { once: true });

    // After the seek completes, restore handlers and resume playback.
    v.addEventListener("seeked", () => {
      // Guard: user may have navigated away while the mobile file was loading.
      if (v !== frontVid() || transitioning) return;
      v.ontimeupdate = savedOntimeupdate;
      v.onended      = savedOnended;
      safePlay(v, "midplay_fallback");
    }, { once: true });
  }
}

function attachVideoAnalytics(v) {
  v.addEventListener("error", onVideoError);
  v.addEventListener("stalled", onStalled, { passive: true });
  v.addEventListener("waiting", onWaiting, { passive: true });
  v.addEventListener(
    "playing",
    () => {
      consecutiveAutoSkips = 0;
      // Video recovered from freeze — cancel mobile auto-skip and emit telemetry
      if (mobileAutoSkipTimer) {
        clearTimeout(mobileAutoSkipTimer);
        mobileAutoSkipTimer = null;
      }
      if (freezeStartMs) {
        const durationMs = Math.round(Date.now() - freezeStartMs);
        freezeStartMs = null;
        if (durationMs >= 1500) {
          queueTelemetry({
            name: "video_freeze",
            durationMs,
            ...clipPayloadFromVideo(v),
          });
        }
      }
    },
    { passive: true }
  );
}

function goTo(index, opts) {
  const force = opts && opts.force;
  if (transitioning && !force) return;
  clearGoToLoad();
  transitioning = true;
  resetBar();

  const prevCurrent = current;
  const goingBackward = index < prevCurrent;
  current = ((index % VIDEOS.length) + VIDEOS.length) % VIDEOS.length;

  // Grab refs before flip
  const incoming      = backVid();
  const incomingLayer = backLayer();
  const outgoing      = frontVid();
  const outgoingLayer = frontLayer();

  // Kill outgoing handlers IMMEDIATELY — prevents preloadNext() from
  // clobbering the incoming video's src while it's trying to load
  outgoing.ontimeupdate = null;
  outgoing.onended      = null;

  // Clear stale handlers on incoming
  incoming.ontimeupdate = null;
  incoming.onended      = null;

  incoming.dataset.clipIndex = String(current);
  // Load if not already preloaded at the correct quality level
  if (!incoming.src.includes(videoFilename(current))) {
    setVideoSrc(incoming, current);
  }

  // Flip front/back tracking
  front = front === "A" ? "B" : "A";

  // START THE VISUAL TRANSITION IMMEDIATELY (feels responsive)
  // Outgoing starts fading out right away regardless of load state
  caption.classList.add("fade");
  minimapEl.classList.remove("visible");
  minimapDotsEl.classList.remove("visible");
  updateDots();
  setTimeout(() => outgoingLayer.classList.remove("active"), 50);

  activeGoToAbort = new AbortController();

  // Quality fallback: if full-res hasn't buffered within 2.5s, silently retry at mobile quality.
  // The existing canplay listener fires again for the new src — no other wiring needed.
  let fallbackTimer = null;
  function tryFallback() {
    fallbackTimer = null;
    if (IS_MOBILE || degradedClips.has(current)) return;
    degradedClips.add(current);
    queueTelemetry({
      name: "quality_fallback",
      rootHint: "buffering_or_throughput",
      ...clipPayloadFromVideo(incoming),
    });
    // url() / posterUrl() now return mobile URLs for this index
    setVideoSrc(incoming, current);
    // Reset watchdog so mobile version gets its own full 5s window
    clearTimeout(activeGoToWatchdog);
    activeGoToWatchdog = setTimeout(() => {
      activeGoToWatchdog = null;
      if (!transitioning) return;
      const abs = incoming.currentSrc || incoming.src;
      const rtW = resourceTimingForUrl(abs);
      queueTelemetry({
        name: "watchdog_timeout",
        rootHint: "buffering_or_throughput",
        fromIndex: prevCurrent,
        ...clipPayloadFromVideo(incoming),
        resourceTiming: rtW,
        resourceHttpStatus: rtW && rtW.responseStatus,
      });
      clearGoToLoad();
      transitioning = false;
      goTo(current + 1);
    }, 5000);
  }
  if (!IS_MOBILE && !degradedClips.has(current) && incoming.readyState < 3) {
    fallbackTimer = setTimeout(tryFallback, 2500);
  }

  function doTransition() {
    if (fallbackTimer) { clearTimeout(fallbackTimer); fallbackTimer = null; }
    clearGoToLoad();
    safePlay(incoming, "goTo_crossfade");
    incomingLayer.classList.add("active");
    if (typeof castCurrentVideo === "function") castCurrentVideo();

    // Caption + minimap fade in halfway through the crossfade
    setTimeout(() => {
      caption.textContent = VIDEOS[current].caption;
      caption.classList.remove("fade");
      updateMiniMap();
      minimapEl.classList.add("visible");
      minimapDotsEl.classList.add("visible");
      pushUrlState();
    }, CROSSFADE_MS / 2);

    setTimeout(() => {
      outgoing.pause();
      incoming.ontimeupdate = () => {
        updateBar(incoming);
        if (incoming.duration && (incoming.duration - incoming.currentTime) < 8) {
          preloadNext();
        }
      };
      incoming.onended = () => goTo(current + 1);
      if (goingBackward) preloadPrev();
      transitioning = false;
    }, CROSSFADE_MS + 100);
  }

  // Watchdog: skip broken/stuck video after 5s
  activeGoToWatchdog = setTimeout(() => {
    activeGoToWatchdog = null;
    if (!transitioning) return;
    const abs = incoming.currentSrc || incoming.src;
    const rtW = resourceTimingForUrl(abs);
    queueTelemetry({
      name: "watchdog_timeout",
      rootHint: "buffering_or_throughput",
      fromIndex: prevCurrent,
      ...clipPayloadFromVideo(incoming),
      resourceTiming: rtW,
      resourceHttpStatus: rtW && rtW.responseStatus,
    });
    clearGoToLoad();
    transitioning = false;
    goTo(current + 1);
  }, 5000);

  if (incoming.readyState >= 3) {
    doTransition();
  } else {
    incoming.addEventListener(
      "canplay",
      doTransition,
      { once: true, signal: activeGoToAbort.signal }
    );
  }
}

// Brief gesture-acknowledgement flash on the matching nav arrow — gives
// the user a visual receipt that the tap/swipe/key was registered while
// the next clip is loading. The CSS keyframe handles fade-in / hold /
// fade-out timing; we just (re)attach the .flash class.
function flashArrow(direction) {
  const el = direction > 0 ? navRight : navLeft;
  el.classList.remove("flash");
  // Force a reflow so removing+re-adding restarts the animation
  // (otherwise rapid presses wouldn't re-trigger the keyframes).
  void el.offsetWidth;
  el.classList.add("flash");
}

function next() {
  // Match goTo()'s debounce so a spam-tap during a crossfade doesn't
  // produce a phantom flash with no actual navigation behind it.
  if (transitioning) return;
  flashArrow(1);
  goTo(current + 1);
}
function prev() {
  if (transitioning) return;
  flashArrow(-1);
  goTo(current - 1);
}

// Expose engine functions for tests
window.goTo        = goTo;
window.preloadNext = preloadNext;
window.backVid     = backVid;
window.frontVid    = frontVid;

attachVideoAnalytics(vidA);
attachVideoAnalytics(vidB);

// ── Decoder-stall watchdog ────────────────────────────────────────────────────
// The browser's `waiting` event only fires when the *network* buffer runs dry.
// A different failure mode — the GPU decoder freezes mid-frame — leaves the
// buffer full but currentTime stopped advancing.  `waiting` never fires, so
// the existing 8s auto-skip doesn't trigger.  This poll catches that case.
//
// Every 2 s we compare currentTime against the previous sample.  If the video
// is supposed to be playing but currentTime hasn't moved in 3+ seconds we
// treat it as a stall, emit `video_stall_watchdog` telemetry, and (on mobile)
// arm the same mobileAutoSkipTimer path as the network-buffer case.
setInterval(() => {
  const v = frontVid();
  // Only watch a video that is actively supposed to be playing
  // Skip if video hasn't started at all (currentTime=0 AND never played any range)
  // but do NOT skip if it's been "playing" for >3s with no progress — that's the stall case.
  const neverStarted = v.currentTime === 0 && v.played.length === 0;
  if (!v || v.paused || v.ended || v.readyState < 2 || neverStarted || transitioning) {
    _wd.lastCT = null;
    _wd.frozenSince = null;
    return;
  }

  const now = Date.now();
  const ct  = v.currentTime;

  // "stuck" = time elapsed since last sample is >1.5 s but currentTime barely moved
  const stuck = (_wd.lastCT !== null) &&
                (now - _wd.lastAt) > 1500 &&
                (ct - _wd.lastCT) < 0.05;

  if (stuck) {
    if (!_wd.frozenSince) _wd.frozenSince = now;

    // Ensure freezeStartMs is set so the playing handler can emit video_freeze
    if (!freezeStartMs) freezeStartMs = _wd.frozenSince;

    // Emit watchdog-specific telemetry once per stall episode
    if (!_wd.telemetrySent) {
      _wd.telemetrySent = true;
      queueTelemetry({
        name: "video_stall_watchdog",
        durationMs: Math.round(now - _wd.frozenSince),
        rootHint: "decoder_stall",
        ...clipPayloadFromVideo(v),
      });
    }

    // On mobile, arm the auto-skip timer (same mechanism as onWaiting)
    if (IS_MOBILE && !mobileAutoSkipTimer && !transitioning) {
      const frozeAt = _wd.frozenSince;
      mobileAutoSkipTimer = setTimeout(() => {
        mobileAutoSkipTimer = null;
        if (v !== frontVid() || transitioning) return;
        queueTelemetry({
          name: "video_freeze_skip",
          durationMs: Math.round(Date.now() - frozeAt),
          rootHint: "watchdog_decoder_stall",
          ...clipPayloadFromVideo(frontVid()),
        });
        goTo(current + 1);
      }, 5000);
    }
  } else {
    _wd.frozenSince    = null;
    _wd.telemetrySent  = false;
  }

  _wd.lastCT = ct;
  _wd.lastAt = now;
}, 2000);

// ═══════════════════════════════════════════════════════════
//  Debug HUD — visible playback metrics for stutter-hunting
//  Toggle by appending ?debug=1 to the URL.
// ═══════════════════════════════════════════════════════════
const DEBUG_MODE = (typeof location !== "undefined") &&
                   new URLSearchParams(location.search).has("debug");
let stallCount = 0, waitingCount = 0, qualityFallbackCount = 0;
let bytesAtSample = 0, lastBytesSample = 0, lastBytesSampleTime = 0, instantBps = 0;

if (DEBUG_MODE) {
  const hudEl = document.getElementById("debug-hud");
  hudEl.classList.add("visible");

  // Tally stall + buffering events on both video elements
  for (const v of [vidA, vidB]) {
    v.addEventListener("stalled", () => { stallCount++; },   { passive: true });
    v.addEventListener("waiting", () => { waitingCount++; }, { passive: true });
  }

  // Track instantaneous download throughput from the most recent video
  // resource entry (PerformanceObserver lets us see each range request).
  if ("PerformanceObserver" in window) {
    try {
      const po = new PerformanceObserver(entries => {
        for (const e of entries.getEntries()) {
          if (e.initiatorType === "video" || /\.mp4(\?|$)/.test(e.name)) {
            bytesAtSample += e.transferSize || e.encodedBodySize || 0;
          }
        }
      });
      po.observe({ type: "resource", buffered: true });
    } catch (_) {}
  }

  // Hook the existing quality_fallback telemetry path
  const _origQueueTelemetry = queueTelemetry;
  queueTelemetry = function(ev) {
    if (ev && (ev.name === "quality_fallback" || ev.name === "quality_fallback_midplay")) qualityFallbackCount++;
    return _origQueueTelemetry(ev);
  };

  // ── Freeze detector ─────────────────────────────────────────────────────
  // Polls currentTime every HUD tick (250 ms). If currentTime hasn't
  // advanced while the video is supposed to be playing, that's a freeze.
  // Counts events, total frozen ms, and longest single freeze — resets per
  // clip so numbers are always "for this clip only".
  //
  // Complementary: getVideoPlaybackQuality() (Chrome/Edge) reports frames
  // the GPU decoder dropped — a non-zero drop rate means the decoder is
  // struggling, not just the network.
  let freezeCount = 0, totalFreezeMs = 0, longestFreezeMs = 0;
  let inFreeze = false, freezeStartTime = null;
  let lastCT = null, lastCTAt = null, lastHudIdx = null;

  function resetFreezeStats() {
    freezeCount = 0; totalFreezeMs = 0; longestFreezeMs = 0;
    inFreeze = false; freezeStartTime = null;
    lastCT = null; lastCTAt = null;
  }

  function updateFreezeStats(v, now) {
    // Reset when clip changes
    const idx = parseInt(v.dataset.clipIndex, 10);
    if (idx !== lastHudIdx) {
      resetFreezeStats();
      lastHudIdx = idx;
    }

    // Only measure when video should be actively playing
    if (v.paused || v.ended || v.readyState < 2 || v.currentTime < 0.5) {
      lastCT = v.currentTime;
      lastCTAt = now;
      return;
    }

    if (lastCT !== null && lastCTAt !== null) {
      const elapsed = now - lastCTAt;      // ms since last tick
      const advanced = v.currentTime - lastCT;   // seconds advanced

      // "Frozen" = more than 200 ms passed but currentTime barely moved
      if (elapsed > 200 && advanced < 0.05) {
        if (!inFreeze) { inFreeze = true; freezeStartTime = lastCTAt; }
      } else {
        if (inFreeze) {
          inFreeze = false;
          const dur = Math.round(now - freezeStartTime);
          // Ignore sub-100 ms micro-pauses (seek repositions, etc.)
          if (dur >= 100) {
            freezeCount++;
            totalFreezeMs += dur;
            longestFreezeMs = Math.max(longestFreezeMs, dur);
          }
        }
      }
    }

    lastCT  = v.currentTime;
    lastCTAt = now;
  }

  function fmtBufRanges(v) {
    const out = [];
    for (let i = 0; i < v.buffered.length; i++) {
      out.push(`${v.buffered.start(i).toFixed(1)}–${v.buffered.end(i).toFixed(1)}`);
    }
    return out.join(",  ") || "empty";
  }

  function cushionFor(v) {
    if (v.buffered.length === 0) return null;
    const end = v.buffered.end(v.buffered.length - 1);
    return Math.max(0, end - v.currentTime);
  }

  function classifyCushion(c) {
    if (c == null) return "bad";
    if (c >= 4) return "ok";
    if (c >= 1.5) return "warn";
    return "bad";
  }

  function updateHUD() {
    const v = frontVid();
    if (!v || !v.dataset.clipIndex) {
      hudEl.textContent = "waiting for first clip…";
      return;
    }

    // Throughput: bytes since last tick, divided by elapsed
    const now = performance.now();
    if (lastBytesSampleTime > 0) {
      const dt = (now - lastBytesSampleTime) / 1000;
      if (dt > 0) instantBps = (bytesAtSample - lastBytesSample) / dt;
    }
    lastBytesSample = bytesAtSample;
    lastBytesSampleTime = now;

    // Freeze detection (updates per-clip stats)
    updateFreezeStats(v, now);

    const idx = parseInt(v.dataset.clipIndex, 10);
    const file = (VIDEOS[idx] && VIDEOS[idx].file) || "?";
    const useLowRes = IS_MOBILE || degradedClips.has(idx);
    const quality = useLowRes ? "mobile" : "desktop";
    const dim = (v.videoWidth && v.videoHeight) ? `${v.videoWidth}×${v.videoHeight}` : "—";
    const cushion = cushionFor(v);
    const cClass = classifyCushion(cushion);
    const conn = navigator.connection || {};
    const bps = instantBps > 0 ? `${(instantBps * 8 / 1e6).toFixed(1)} Mbps` : "—";

    // Freeze summary for this clip
    const freezeClass = (freezeCount > 0 || inFreeze) ? "warn" : "ok";
    const freezeLine = freezeCount === 0 && !inFreeze
      ? "none"
      : `${freezeCount} event${freezeCount !== 1 ? "s" : ""} · ${totalFreezeMs}ms total` +
        (freezeCount > 1 ? ` · avg ${Math.round(totalFreezeMs / freezeCount)}ms · max ${longestFreezeMs}ms` : "") +
        (inFreeze ? " · <span class='warn'>FROZEN NOW</span>" : "");

    // Dropped-frame stats (Chrome/Edge: getVideoPlaybackQuality)
    const pq = v.getVideoPlaybackQuality ? v.getVideoPlaybackQuality() : null;
    const frameClass = pq && pq.totalVideoFrames > 0 && pq.droppedVideoFrames > 0 ? "warn" : "ok";
    const frameLine = pq && pq.totalVideoFrames > 0
      ? `<span class="${frameClass}">${pq.droppedVideoFrames} dropped / ${pq.totalVideoFrames} total` +
        ` (${(pq.droppedVideoFrames / pq.totalVideoFrames * 100).toFixed(1)}%)</span>`
      : "— (API unavailable)";

    hudEl.innerHTML =
      `mode   ${playbackMode}  (${idx + 1}/${VIDEOS.length})\n` +
      `clip   ${file} (${quality})\n` +
      `dim    ${dim}  @ ${(v.duration||0).toFixed(1)}s\n` +
      `time   ${v.currentTime.toFixed(1)}s\n` +
      `state  ready=${v.readyState}  net=${v.networkState}\n` +
      `buffer ${fmtBufRanges(v)}\n` +
      `cushion <span class="${cClass}">${cushion == null ? "—" : cushion.toFixed(1) + "s"}</span>\n` +
      `freeze <span class="${freezeClass}">${freezeLine}</span>\n` +
      `frames ${frameLine}\n` +
      `stalls <span class="${stallCount + waitingCount > 0 ? "warn" : "ok"}">${stallCount} stalled · ${waitingCount} waiting · ${qualityFallbackCount} fallbacks</span>\n` +
      `dl     ${bps}\n` +
      (conn.effectiveType ? `net    ${conn.effectiveType} · ${conn.downlink || "?"} Mbps · ${conn.rtt || "?"}ms\n` : "");
  }

  setInterval(updateHUD, 250);
  updateHUD();
}

// ── Section selector ─────────────────────────────────────

function buildSectionMenu() {
  sectionDropdown.innerHTML = "";
  SECTIONS.forEach(sec => {
    const el = document.createElement("div");
    el.className = "section-item" + (playbackMode === sec.id ? " active" : "");
    el.textContent = sec.name;
    el.addEventListener("click", e => { e.stopPropagation(); setPlaybackMode(sec.id); closeSectionMenu(); });
    sectionDropdown.appendChild(el);
  });
  const divider = document.createElement("div");
  divider.className = "section-divider";
  sectionDropdown.appendChild(divider);
  const shuf = document.createElement("div");
  shuf.className = "section-item" + (playbackMode === "shuffle" ? " active" : "");
  shuf.innerHTML = '<svg class="shuffle-icon" viewBox="0 0 24 24"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>Shuffle All';
  shuf.addEventListener("click", e => { e.stopPropagation(); setPlaybackMode("shuffle"); closeSectionMenu(); });
  sectionDropdown.appendChild(shuf);
}

// sectionFocusIdx tracks keyboard focus within the open dropdown.
// Items are ordered: [...SECTIONS, shuffle] — indices 0..SECTIONS.length
let sectionFocusIdx = 0;

function sectionItemModes() {
  return [...SECTIONS.map(s => s.id), "shuffle"];
}

function highlightSectionItem() {
  [...sectionDropdown.querySelectorAll(".section-item")].forEach((el, i) => {
    el.classList.toggle("tv-focus", i === sectionFocusIdx);
  });
}

function selectFocusedSection() {
  const modes = sectionItemModes();
  const mode = modes[sectionFocusIdx];
  if (mode) { setPlaybackMode(mode); closeSectionMenu(); }
}

function openSectionMenu() {
  sectionMenuOpen = true;
  // Pre-select the currently active mode so D-pad confirms immediately
  const modes = sectionItemModes();
  const idx = modes.indexOf(playbackMode);
  sectionFocusIdx = idx >= 0 ? idx : 0;
  buildSectionMenu();
  sectionDropdown.classList.add("open");
  sectionBtn.classList.add("active");
  if (IS_TV) highlightSectionItem();
}
function closeSectionMenu() { sectionMenuOpen = false; sectionDropdown.classList.remove("open"); sectionBtn.classList.remove("active"); }
function toggleSectionMenu() { sectionMenuOpen ? closeSectionMenu() : openSectionMenu(); }

sectionBtn.addEventListener("click", e => { e.stopPropagation(); toggleSectionMenu(); });
document.addEventListener("click", () => { if (sectionMenuOpen) closeSectionMenu(); });

// Prevent section UI touches from triggering video navigation
[sectionBtn, sectionDropdown].forEach(el => {
  el.addEventListener("touchstart", e => e.stopPropagation());
  el.addEventListener("touchend",   e => e.stopPropagation());
});

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Reorders VIDEOS + sets playbackMode — does NOT start playback.
// Used by both setPlaybackMode (runtime) and the startup URL-restore path.
function applyPlaybackMode(mode) {
  playbackMode = mode;
  let newOrder;
  if (mode === "shuffle") {
    newOrder = shuffleArray(MASTER_VIDEOS.map(v => ({...v})));
  } else {
    // Section mode: only this section's videos, shuffled, looping within section
    newOrder = shuffleArray(
      MASTER_VIDEOS.filter(v => v.section === mode).map(v => ({...v}))
    );
  }
  VIDEOS.length = 0;
  newOrder.forEach(v => VIDEOS.push(v));
}

const SHUFFLE_SVG = '<svg viewBox="0 0 24 24"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>';

function updateSectionBtn() {
  if (playbackMode === "shuffle") {
    sectionBtn.innerHTML = SHUFFLE_SVG;
    sectionBtn.setAttribute("aria-label", "Shuffle All");
  } else {
    const sec = SECTIONS.find(s => s.id === playbackMode);
    sectionBtn.innerHTML = sec ? sec.name : "";
    sectionBtn.setAttribute("aria-label", sec ? sec.name : "Sections");
  }
}

function setPlaybackMode(mode) {
  applyPlaybackMode(mode);
  clearGoToLoad();
  transitioning = false;
  current = 0;
  buildDots();
  goTo(0, { force: true });
  // Fade label out, swap content, fade back in
  sectionBtn.style.opacity = "0";
  setTimeout(() => {
    updateSectionBtn();
    sectionBtn.style.removeProperty("opacity");
  }, 280);
}

// Write current playback state into the URL so it can be shared.
// Preserves any other query params (e.g. ?debug=1).
function pushUrlState() {
  const params = new URLSearchParams(location.search);
  const file = VIDEOS[current] ? VIDEOS[current].file.replace(".mp4", "") : null;
  if (playbackMode !== "shuffle") params.set("s", playbackMode);
  else params.delete("s");
  if (file) params.set("v", file);
  else params.delete("v");
  const qs = params.toString();
  history.replaceState(null, "", qs ? "?" + qs : location.pathname);
}

// ── Mini map ─────────────────────────────────────────────
//
// Maps live as static SVG files (`/maps/us.svg`, `/maps/world.svg`)
// generated from Natural Earth GeoJSON in equirectangular projection
// so dot positioning is just linear lat/lng → x/y math.
//   us.svg    viewBox 0 0 585 255  (lng -125…-66.5  ×  lat 49.5…24)
//   world.svg viewBox 0 0 360 180  (lng -180…180    ×  lat  90…-90)
// Both contain a single <g class="map-land"> with one <path> per
// state/country; no dot. We fetch them once at init and inject two
// <circle> elements (glow + dot) before the closing </svg> so the
// dot inherits the SVG's coordinate system and updateMiniMap() stays
// a one-line projection.

function isInBayArea(lat, lng) {
  // Tight bbox around the 9 Bay Area counties. Excludes Tahoe, Yosemite,
  // Carmel/Big Sur (those still trigger isInCalifornia → CA view).
  return lat >= 36.90 && lat <= 38.86 && lng >= -123.55 && lng <= -121.20;
}
function isInCalifornia(lat, lng) {
  // Continental California bounding box. Catches everything in the
  // current catalog without bleeding too far into NV/AZ/OR.
  return lat >= 32.5 && lat <= 42.0 && lng >= -124.5 && lng <= -114.0;
}
function isContigUS(lat, lng) { return lat >= 24.5 && lat <= 49.5 && lng >= -125 && lng <= -66; }
function isInEurope(lat, lng) {
  // Covers Iberian Peninsula through the Balkans, excluding non-European lngs.
  return lat >= 34.0 && lat <= 57.0 && lng >= -13.0 && lng <= 27.0;
}

// Projections — all equirectangular at varying scales. Each maps the
// region's bounding-box lng/lat to the SVG's viewBox 0..W, 0..H.
function projectBay(lat, lng)    { return { x: (lng - (-123.533665)) * 100.0, y: (38.864245 - lat) * 100.0 }; }
function projectCA(lat, lng)     { return { x: (lng - (-124.5))      * 10.0,  y: (42.0       - lat) * 10.0  }; }
function projectUS(lat, lng)     { return { x: (lng - (-125.0))      * 10.0,  y: (49.5       - lat) * 10.0  }; }
// World viewBox now starts at lat 84°N (cropped from original lat 90)
// to remove empty Arctic + Antarctic strips. Y origin shifts accordingly.
function projectWorld(lat, lng)  { return { x: lng + 180,                      y: 84 - lat                  }; }
// Europe uses the same equirectangular coords as world (lng+180, 84-lat)
// because europe.svg is just world.svg with viewBox="167 28 40 22".
function projectEurope(lat, lng) { return { x: lng + 180,                      y: 84 - lat                  }; }

// Dot/glow radii tuned per viewBox so the rendered dot is ~5–6px at
// the displayed map size. Bay viewBox is largest in absolute units
// (×100 scale vs the others' ×10) so its radii are bigger; world is
// the smallest viewBox so its radii are tightest.
const MAP_DOT_RADIUS = {
  bay:    { glow: 14,  dot: 6   },
  ca:     { glow: 5.5, dot: 2.5 },
  us:     { glow: 18,  dot: 7.5 },
  world:  { glow: 15,  dot: 6.5 },
  europe: { glow: 1.5, dot: 0.65 },
};

// Radius of gray neighbor-video pins — ~55% of the main dot
const MAP_PIN_RADIUS = { bay: 4, ca: 1.4, us: 4.5, world: 3.5, europe: 0.4 };

// Transparent hit-target radius — tuned so each renders as ~8 px at display size.
// Formula: target_px * (viewBox_width / display_width)
//   bay:    8 * (232.5 / 132) ≈ 14    us:  8 * (585  / 176) ≈ 26
//   ca:     8 * (105   / 106) ≈  8    world: 8 * (360 / 214) ≈ 13
//   europe: 8 * (40    / 200) ≈  1.6
const MAP_HIT_RADIUS = { bay: 14, ca: 8, us: 26, world: 13, europe: 1.6 };

// {bay:[{file,x,y}], ca:[...], us:[...], world:[...], europe:[...]}
// Built from MASTER_VIDEOS so pins always show the full catalog regardless
// of which section is currently active.
let mapPinData = null;

function buildMapPinData() {
  mapPinData = { bay: [], ca: [], us: [], world: [], europe: [] };
  MASTER_VIDEOS.forEach(v => {
    if (v.lat == null || v.lng == null || v.noPin) return;
    const type =
      isInBayArea(v.lat, v.lng)    ? "bay"    :
      isInCalifornia(v.lat, v.lng) ? "ca"     :
      isContigUS(v.lat, v.lng)     ? "us"     :
      isInEurope(v.lat, v.lng)     ? "europe" : "world";
    const project =
      type === "bay"    ? projectBay    :
      type === "ca"     ? projectCA     :
      type === "us"     ? projectUS     :
      type === "europe" ? projectEurope : projectWorld;
    const { x, y } = project(v.lat, v.lng);
    mapPinData[type].push({ file: v.file, caption: v.caption, x, y });
  });
}

// Navigate to a specific video by file name, switching to shuffle mode so
// the full catalog is restored and the clicked clip plays immediately.
function navigateToVideo(file) {
  applyPlaybackMode("shuffle");
  updateSectionBtn();
  const idx = VIDEOS.findIndex(v => v.file === file);
  if (idx < 0) return;
  clearGoToLoad();
  transitioning = false;
  current = idx;
  buildDots();
  goTo(idx, { force: true });
}

async function initMiniMap() {
  // Pull viewBox out of each fetched SVG so the matching dot-overlay
  // SVG inherits the same coordinate system — guarantees the dot's
  // (cx, cy) lands on the same pixel as the masked landmass below.
  function getViewBox(svgText) {
    const m = svgText.match(/viewBox="([^"]+)"/);
    return m ? m[1] : "0 0 100 100";
  }

  // Land SVG: state/country/county outlines only. No dot.
  function buildLand(svgText, kind) {
    return svgText.replace("<svg ", `<svg id="map-${kind}" class="map-svg hidden" `);
  }

  // Dot SVG: lives in the sibling #minimap-dots container so the
  // CSS mask on #minimap can never clip it. Same viewBox as the land
  // SVG ⇒ same projection ⇒ same pixel position.
  function buildDots(svgText, kind) {
    const r = MAP_DOT_RADIUS[kind];
    return `<svg id="dot-${kind}" class="dot-svg hidden" `
         + `viewBox="${getViewBox(svgText)}" preserveAspectRatio="xMidYMid meet">`
         + `<g class="map-pins"></g>`
         + `<circle class="map-dot-glow" cx="0" cy="0" r="${r.glow}"/>`
         + `<circle class="map-dot"      cx="0" cy="0" r="${r.dot}"/>`
         + `</svg>`;
  }

  try {
    const [usText, worldText, caText, bayText, europeText] = await Promise.all([
      fetch("/maps/us.svg").then(r => r.text()),
      fetch("/maps/world.svg").then(r => r.text()),
      fetch("/maps/ca.svg").then(r => r.text()),
      fetch("/maps/bay.svg").then(r => r.text()),
      fetch("/maps/europe.svg").then(r => r.text()),
    ]);
    minimapEl.innerHTML =
      buildLand(bayText,    "bay") +
      buildLand(caText,     "ca") +
      buildLand(usText,     "us") +
      buildLand(worldText,  "world") +
      buildLand(europeText, "europe");
    minimapDotsEl.innerHTML =
      buildDots(bayText,    "bay") +
      buildDots(caText,     "ca") +
      buildDots(usText,     "us") +
      buildDots(worldText,  "world") +
      buildDots(europeText, "europe");
    // Build pin position lookup now that both VIDEOS metadata and SVG
    // coordinate systems are available.
    buildMapPinData();
    // Maps may have arrived after the first updateMiniMap() call
    // (which silently no-ops when the SVGs aren't there yet) — re-run it
    // now so the dot snaps to the current clip's location.
    updateMiniMap();
  } catch (err) {
    queueTelemetry({ name: "minimap_load_failed", message: String(err) });
  }
}

const MAP_TYPES = ["bay", "ca", "us", "world", "europe"];

function updateMiniMap() {
  const v = VIDEOS[current];
  if (!v || v.lat == null) return;
  const landEls = Object.fromEntries(MAP_TYPES.map(k => [k, document.getElementById("map-" + k)]));
  const dotEls  = Object.fromEntries(MAP_TYPES.map(k => [k, document.getElementById("dot-" + k)]));
  if (MAP_TYPES.some(k => !landEls[k] || !dotEls[k])) return; // SVGs still loading

  // Five-tier zoom cascade. Each predicate is checked from most to
  // least zoomed, so a Bay Area clip resolves to "bay" before
  // "ca"/"us" can match it. Europe intercepts before falling to world.
  const mapType =
    isInBayArea(v.lat, v.lng)     ? "bay"    :
    isInCalifornia(v.lat, v.lng)  ? "ca"     :
    isContigUS(v.lat, v.lng)      ? "us"     :
    isInEurope(v.lat, v.lng)      ? "europe" :
                                    "world";

  if (mapType !== currentMapType) {
    currentMapType = mapType;
    for (const k of MAP_TYPES) {
      landEls[k].classList.toggle("hidden", k !== mapType);
      dotEls[k].classList.toggle("hidden",  k !== mapType);
      // Match the plate's contour to the active map type — mutually
      // exclusive classes drive the matching mask-image.
      minimapEl.classList.toggle(k, k === mapType);
      minimapDotsEl.classList.toggle(k, k === mapType);
    }
  }

  const project =
    mapType === "bay"    ? projectBay    :
    mapType === "ca"     ? projectCA     :
    mapType === "us"     ? projectUS     :
    mapType === "europe" ? projectEurope :
                           projectWorld;
  const pos = project(v.lat, v.lng);
  // Position dot in the unmasked overlay SVG so it can never get
  // clipped by the landmass mask (e.g. Tahoe sitting on the eastern
  // CA border).
  dotEls[mapType].querySelectorAll(".map-dot, .map-dot-glow").forEach(d => {
    d.setAttribute("cx", pos.x);
    d.setAttribute("cy", pos.y);
  });

  // Render gray tappable pins for all videos in the catalog at this zoom level.
  // Uses MASTER_VIDEOS-based pin data so pins are never hidden by section filters.
  // Clicking any pin exits section mode, restores shuffle, and plays that clip.
  if (mapPinData) {
    const pinsGroup = dotEls[mapType].querySelector(".map-pins");
    if (pinsGroup) {
      pinsGroup.innerHTML = "";
      const r   = MAP_PIN_RADIUS[mapType];
      const rHit = MAP_HIT_RADIUS[mapType];
      const currentFile = VIDEOS[current]?.file;
      mapPinData[mapType].forEach(({ file, caption, x, y }) => {
        if (file === currentFile) return; // blue dot already marks current
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.classList.add("map-pin-group");

        // Large transparent circle = hit target
        const hit = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        hit.setAttribute("cx", x);
        hit.setAttribute("cy", y);
        hit.setAttribute("r", rHit);
        hit.setAttribute("fill", "transparent");

        // Small visible circle
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", x);
        c.setAttribute("cy", y);
        c.setAttribute("r", r);
        c.classList.add("map-pin");

        g.appendChild(hit);
        g.appendChild(c);
        g.addEventListener("click", e => { e.stopPropagation(); navigateToVideo(file); });
        // touchend fires immediately on mobile; preventDefault stops the
        // subsequent click event from double-firing navigateToVideo
        g.addEventListener("touchend", e => { e.stopPropagation(); e.preventDefault(); navigateToVideo(file); }, { passive: false });
        g.addEventListener("mouseenter", e => showMapTooltip(caption, e.clientX, e.clientY));
        g.addEventListener("mouseleave", hideMapTooltip);
        pinsGroup.appendChild(g);
      });
    }
  }
}

// ── keyboard / swipe ──────────────────────────────────────
// ── Welcome overlay toggle ────────────────────────────────
let welcomeDocked = false;
function toggleWelcome() {
  welcomeDocked = !welcomeDocked;
  welcomeEl.classList.toggle("docked", welcomeDocked);
}

document.addEventListener("keydown", e => {
  // s / S — toggle section menu (mapped to Play/Pause on TV remotes)
  if (e.key === "s" || e.key === "S") {
    toggleSectionMenu();
    return;
  }

  // When the section dropdown is open, Up/Down/Enter navigate it;
  // all other keys fall through to normal video nav
  if (sectionMenuOpen) {
    if (e.key === "ArrowDown") {
      e.preventDefault();
      sectionFocusIdx = Math.min(sectionFocusIdx + 1, sectionItemModes().length - 1);
      highlightSectionItem();
      return;
    }
    if (e.key === "ArrowUp") {
      e.preventDefault();
      sectionFocusIdx = Math.max(sectionFocusIdx - 1, 0);
      highlightSectionItem();
      return;
    }
    if (e.key === "Enter") { selectFocusedSection(); return; }
    if (e.key === "Escape") { closeSectionMenu(); return; }
  }

  if (e.key === "Escape" && sectionMenuOpen) { closeSectionMenu(); return; }
  if (e.key === "ArrowRight") { dismissHint(); closeSectionMenu(); next(); }
  if (e.key === "ArrowLeft")  { dismissHint(); closeSectionMenu(); prev(); }
  if (e.key === "ArrowUp" || e.key === "ArrowDown") { e.preventDefault(); toggleWelcome(); }
});

// Tap/click anywhere on the left or right half of the screen → prev/next.
// `goTo()` already debounces via the `transitioning` flag, so spamming
// taps just gets silently dropped instead of stacking transitions.
// The list of selectors below is explicit so we don't accidentally trigger
// nav when the user meant to interact with one of the on-screen UI bits.
const NAV_TAP_IGNORE = "#welcome, #section-btn, #section-dropdown, .nav-arrow, .nav-arrow *, #debug-hud, #minimap, #minimap *, #minimap-dots, #minimap-dots *";
document.addEventListener("click", (e) => {
  if (e.target.closest(NAV_TAP_IGNORE)) return;
  // If a swipe just happened, the touchend handler will have fired
  // next()/prev() already — but click also fires on tap. Distinguish via
  // the same dx threshold: touchstart→touchend with |dx|>35 = swipe;
  // anything else falling through to here is a tap.
  if (lastSwipeAt && Date.now() - lastSwipeAt < 400) return;
  dismissHint();
  closeSectionMenu();
  // Only the outer 22% of each side triggers nav — centre taps do nothing
  const x = e.clientX, w = window.innerWidth;
  if (x < w * 0.22) prev();
  else if (x > w * 0.78) next();
});

let touchX = null;
let touchY = null;
let lastSwipeAt = 0;
document.addEventListener("touchstart", e => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchend", e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 35) {
    // vertical swipe — toggle welcome overlay
    lastSwipeAt = Date.now();
    toggleWelcome();
  } else if (Math.abs(dx) > 35) {
    lastSwipeAt = Date.now();
    dismissHint();
    dx < 0 ? next() : prev();
  }
  touchX = null;
  touchY = null;
}, { passive: true });

function dismissHint() {
  if (!hintDismissed) {
    hintDismissed = true;
    navLeft.classList.add("hidden");
    navRight.classList.add("hidden");
  }
}
// Nav arrows fade 5s after the first video starts (timer set in begin()).
// Setting the timer at parse time would let it fire while the spinner is
// still up on slow connections, before the user has even seen them.

navLeft.addEventListener("click", e => { e.stopPropagation(); dismissHint(); prev(); });
navRight.addEventListener("click", e => { e.stopPropagation(); dismissHint(); next(); });
[navLeft, navRight].forEach(el => {
  // Stop touches from also triggering the global swipe handler
  el.addEventListener("touchstart", e => e.stopPropagation(), { passive: true });
  el.addEventListener("touchend",   e => e.stopPropagation(), { passive: true });
});

// ── Apply URL state → mode + starting video ───────────────
// Params: ?s=<section|shuffle>  ?v=<file-stem>  (e.g. ?s=cities&v=video-07)
// Unrecognised ?s falls back to shuffle. ?v works in any mode.
const _urlParams  = new URLSearchParams(location.search);
const _urlSection = _urlParams.get("s") || "shuffle";
const _urlVideo   = _urlParams.get("v");  // e.g. "video-07" (no .mp4 needed)

const _initMode = SECTIONS.some(s => s.id === _urlSection) ? _urlSection : "shuffle";
applyPlaybackMode(_initMode);

const _startIdx = (() => {
  if (!_urlVideo) return 0;
  const file = _urlVideo.endsWith(".mp4") ? _urlVideo : _urlVideo + ".mp4";
  const idx = VIDEOS.findIndex(v => v.file === file);
  return idx >= 0 ? idx : 0;
})();

// ── init ──────────────────────────────────────────────────
function init() {
  initMiniMap();
  buildDots();

  // Set up first video on layer A (may be non-zero when restoring from URL)
  current = _startIdx;
  vidA.dataset.clipIndex = String(_startIdx);
  vidA.muted = true;
  vidA.playsInline = true;
  setVideoSrc(vidA, _startIdx);

  let started = false;
  function begin() {
    if (suppressInitialBegin) return;
    if (started) return;
    allowErrorRecovery = true;
    started = true;
    spinner.classList.add("gone");
    setTimeout(() => {
      updateSectionBtn();
      sectionBtn.classList.add("visible");
      minimapEl.classList.add("visible");
      minimapDotsEl.classList.add("visible");
    }, 1500);
    layerA.classList.add("active");
    safePlay(vidA, "init_begin");
    caption.textContent = VIDEOS[current].caption;
    updateMiniMap();
    pushUrlState();
    vidA.ontimeupdate = () => {
      updateBar(vidA);
      if (vidA.duration && (vidA.duration - vidA.currentTime) < 8) preloadNext();
    };
    vidA.onended = () => goTo(current + 1);
    // On TV the remote arrows are always needed — keep them visible
    if (!IS_TV) setTimeout(dismissHint, 5000);
  }

  vidA.addEventListener("canplay", begin, { once: true });
  setTimeout(() => { spinner.classList.add("gone"); begin(); }, 6000);
}

init();

// ── Welcome overlay — dock to top-left after 30s ─────────
const welcomeEl = document.getElementById("welcome");
welcomeEl.addEventListener("click", toggleWelcome);
if (IS_APP) {
  // Native app — hide branding entirely
  welcomeEl.style.display = "none";
} else if (!IS_TV) {
  setTimeout(() => {
    welcomeDocked = true;
    welcomeEl.classList.add("docked");
  }, 30000);
} else {
  // Dock immediately on TV so the full 16:9 frame is unobstructed
  welcomeDocked = true;
  welcomeEl.classList.add("docked");
}
// ── Map pin tooltip ───────────────────────────────────────
const mapTooltip = document.getElementById("map-tooltip");
let tooltipHideTimer = null;

function tooltipPos(cx, cy) {
  const tw  = mapTooltip.offsetWidth;
  const th  = mapTooltip.offsetHeight;
  const pad = 8;
  let left = cx + 14;
  let top  = cy - th - 8;
  // Flip left if right edge clips
  if (left + tw + pad > window.innerWidth) left = cx - tw - 14;
  // Hard-clamp both horizontal edges
  left = Math.max(pad, Math.min(left, window.innerWidth - tw - pad));
  // Flip below cursor if top clips
  if (top < pad) top = cy + 14;
  // Hard-clamp bottom edge
  if (top + th + pad > window.innerHeight) top = window.innerHeight - th - pad;
  return { left, top };
}

document.addEventListener("mousemove", e => {
  if (mapTooltip.classList.contains("visible")) {
    const { left, top } = tooltipPos(e.clientX, e.clientY);
    mapTooltip.style.left = left + "px";
    mapTooltip.style.top  = top  + "px";
  }
});

function showMapTooltip(caption, x, y) {
  clearTimeout(tooltipHideTimer);
  mapTooltip.textContent = caption;
  const { left, top } = tooltipPos(x, y);
  mapTooltip.style.left = left + "px";
  mapTooltip.style.top  = top  + "px";
  mapTooltip.classList.add("visible");
}
function hideMapTooltip() {
  tooltipHideTimer = setTimeout(() => mapTooltip.classList.remove("visible"), 80);
}

// ═══════════════════════════════════════════════════════════
//  CASTING — AirPlay + Google Cast
// ═══════════════════════════════════════════════════════════

const castControls   = document.getElementById("cast-controls");
const airplayBtn     = document.getElementById("airplay-btn");
const chromecastBtn  = document.getElementById("chromecast-btn");

function syncCastControlsVisibility() {
  const anyShown = airplayBtn.style.display === "flex" ||
                   chromecastBtn.style.display === "flex";
  castControls.classList.toggle("visible", anyShown);
}

// ── AirPlay ────────────────────────────────────────────────
(function initAirPlay() {
  if (typeof window.WebKitPlaybackTargetAvailabilityEvent === "undefined") return;

  function onAvailability(e) {
    // AirPlay button intentionally hidden to avoid UI clutter;
    // picker still works if wired to another trigger in the future.
    syncCastControlsVisibility();
  }

  function onWirelessChanged() {
    airplayBtn.classList.toggle(
      "active",
      !!frontVid().webkitCurrentPlaybackTargetIsWireless
    );
  }

  [vidA, vidB].forEach(v => {
    v.addEventListener("webkitplaybacktargetavailabilitychanged", onAvailability);
    v.addEventListener("webkitcurrentplaybacktargetiswirelesschanged", onWirelessChanged);
  });

  airplayBtn.addEventListener("click", () => frontVid().webkitShowPlaybackTargetPicker());
})();

// ── Google Cast ────────────────────────────────────────────
function castCurrentVideo() {
  if (typeof cast === "undefined") return;
  const session = cast.framework.CastContext.getInstance().getCurrentSession();
  if (!session) return;
  const videoUrl = url(current);
  const mediaInfo = new chrome.cast.media.MediaInfo(videoUrl, "video/mp4");
  mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
  mediaInfo.metadata.title = VIDEOS[current].caption;
  const request = new chrome.cast.media.LoadRequest(mediaInfo);
  session.loadMedia(request).catch(() => {});
}

window["__onGCastApiAvailable"] = function(isAvailable) {
  if (!isAvailable) return;

  const context = cast.framework.CastContext.getInstance();
  context.setOptions({
    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED,
  });

  chromecastBtn.style.display = "flex";
  syncCastControlsVisibility();

  context.addEventListener(
    cast.framework.CastContextEventType.SESSION_STATE_CHANGED,
    function(event) {
      const S = cast.framework.SessionState;
      if (event.sessionState === S.SESSION_STARTED ||
          event.sessionState === S.SESSION_RESUMED) {
        chromecastBtn.classList.add("active");
        castCurrentVideo();
      } else if (event.sessionState === S.SESSION_ENDED) {
        chromecastBtn.classList.remove("active");
      }
    }
  );

  chromecastBtn.addEventListener("click", function() {
    const connected = context.getCastState() === cast.framework.CastState.CONNECTED;
    connected ? context.endCurrentSession(true) : context.requestSession();
  });
};
</script>
