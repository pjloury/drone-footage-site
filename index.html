<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Footage</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    /* ── Video layers ─────────────────────────────────────── */
    #stage { position: relative; width: 100vw; height: 100vh; }

    .layer {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 1.8s ease-in-out;
    }
    .layer.active { opacity: 1; }

    .layer video {
      width: 100%; height: 100%;
      object-fit: cover;   /* fill the screen, crop edges if needed */
      display: block;
    }

    /* ── Caption ──────────────────────────────────────────── */
    #caption {
      position: fixed; bottom: 44px; left: 44px; z-index: 50;
      color: #fff;
      font-size: clamp(0.75rem, 1.5vw, 1rem);
      font-weight: 400; letter-spacing: 0.06em;
      text-shadow: 0 1px 4px rgba(0,0,0,.9), 0 0 12px rgba(0,0,0,.6);
      pointer-events: none;
      transition: opacity 0.6s ease-in-out;
    }
    #caption.fade { opacity: 0; }

    /* ── Progress dots ────────────────────────────────────── */
    #dots {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 50; display: flex; gap: 8px;
      pointer-events: none;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,.25);
      transition: background .4s, transform .4s;
    }
    .dot.active { background: rgba(255,255,255,.85); transform: scale(1.4); }

    /* ── Arrow hint ───────────────────────────────────────── */
    #hint {
      position: fixed; bottom: 44px; right: 44px; z-index: 50;
      color: rgba(255,255,255,.35);
      font-size: clamp(.6rem, 1.1vw, .8rem); letter-spacing: .14em;
      pointer-events: none;
      transition: opacity 1.2s ease;
    }
    #hint.hidden { opacity: 0; }

    /* ── Progress bar ─────────────────────────────────────── */
    #bar {
      position: fixed; bottom: 0; left: 0;
      height: 2px; width: 0%;
      background: rgba(255,255,255,.45);
      z-index: 50; pointer-events: none;
    }

    /* ── Loading spinner (shown while first video buffers) ── */
    #spinner {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: #000;
      transition: opacity .8s ease;
    }
    #spinner.gone { opacity: 0; pointer-events: none; }
    .ring {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: rgba(255,255,255,.7);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="spinner"><div class="ring"></div></div>

<div id="stage">
  <div class="layer" id="layerA"><video id="vidA" playsinline muted preload="auto"></video></div>
  <div class="layer" id="layerB"><video id="vidB" playsinline muted preload="auto"></video></div>
</div>

<div id="caption"></div>
<div id="dots"></div>
<div id="hint">← &nbsp;&nbsp; → &nbsp; to navigate</div>
<div id="bar"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════════════

// Base URL of your Cloudflare R2 public bucket
// e.g. "https://pub-abc123.r2.dev"  (no trailing slash)
const BASE_URL = "https://pub-abee44b9f56049338f38452f0835b88f.r2.dev";

const VIDEOS = [
  { file: "video-01.mp4", caption: "Location 1"  },
  { file: "video-02.mp4", caption: "Location 2"  },
  { file: "video-03.mp4", caption: "Location 3"  },
  { file: "video-04.mp4", caption: "Location 4"  },
  { file: "video-05.mp4", caption: "Location 5"  },
  { file: "video-06.mp4", caption: "Location 6"  },
  { file: "video-07.mp4", caption: "Location 7"  },
  { file: "video-08.mp4", caption: "Location 8"  },
  { file: "video-09.mp4", caption: "Location 9"  },
  { file: "video-10.mp4", caption: "Location 10" },
  { file: "video-11.mp4", caption: "Location 11" },
  { file: "video-12.mp4", caption: "Location 12" },
  { file: "video-13.mp4", caption: "Location 13" },
  { file: "video-14.mp4", caption: "Location 14" },
  { file: "video-15.mp4", caption: "Location 15" },
  { file: "video-16.mp4", caption: "Location 16" },
  { file: "video-17.mp4", caption: "Location 17" },
  { file: "video-18.mp4", caption: "Location 18" },
  { file: "video-19.mp4", caption: "Location 19" },
  { file: "video-20.mp4", caption: "Location 20" },
  { file: "video-21.mp4", caption: "Location 21" },
  { file: "video-22.mp4", caption: "Location 22" },
  { file: "video-23.mp4", caption: "Location 23" },
  { file: "video-24.mp4", caption: "Location 24" },
  { file: "video-25.mp4", caption: "Location 25" },
  { file: "video-26.mp4", caption: "Location 26" },
  { file: "video-27.mp4", caption: "Location 27" },
  { file: "video-28.mp4", caption: "Location 28" },
  { file: "video-29.mp4", caption: "Location 29" },
  { file: "video-30.mp4", caption: "Location 30" },
  { file: "video-31.mp4", caption: "Location 31" },
  { file: "video-32.mp4", caption: "Location 32" },
  { file: "video-33.mp4", caption: "Location 33" },
  { file: "video-34.mp4", caption: "Location 34" },
  { file: "video-35.mp4", caption: "Location 35" },
  { file: "video-36.mp4", caption: "Location 36" },
  { file: "video-37.mp4", caption: "Location 37" },
  { file: "video-38.mp4", caption: "Location 38" },
  { file: "video-39.mp4", caption: "Location 39" },
  { file: "video-40.mp4", caption: "Location 40" },
  { file: "video-41.mp4", caption: "Location 41" },
  { file: "video-42.mp4", caption: "Location 42" },
  { file: "video-43.mp4", caption: "Location 43" },
  { file: "video-44.mp4", caption: "Location 44" },
  { file: "video-45.mp4", caption: "Location 45" },
  { file: "video-46.mp4", caption: "Location 46" },
  { file: "video-47.mp4", caption: "Location 47" },
  { file: "video-48.mp4", caption: "Location 48" },
  { file: "video-49.mp4", caption: "Location 49" },
  { file: "video-50.mp4", caption: "Location 50" },
  { file: "video-51.mp4", caption: "Location 51" },
  { file: "video-52.mp4", caption: "Location 52" },
  { file: "video-53.mp4", caption: "Location 53" },
  { file: "video-54.mp4", caption: "Location 54" },
  { file: "video-55.mp4", caption: "Location 55" },
  { file: "video-56.mp4", caption: "Location 56" },
  { file: "video-57.mp4", caption: "Location 57" },
  { file: "video-58.mp4", caption: "Location 58" },
  { file: "video-59.mp4", caption: "Location 59" },
  { file: "video-60.mp4", caption: "Location 60" },
  { file: "video-61.mp4", caption: "Location 61" },
  { file: "video-62.mp4", caption: "Location 62" },
];

const CROSSFADE_MS = 1800;  // must match CSS transition duration above

// ═══════════════════════════════════════════════════════════
//  Engine
// ═══════════════════════════════════════════════════════════

const layerA   = document.getElementById("layerA");
const layerB   = document.getElementById("layerB");
const vidA     = document.getElementById("vidA");
const vidB     = document.getElementById("vidB");
const caption  = document.getElementById("caption");
const dotsEl   = document.getElementById("dots");
const hintEl   = document.getElementById("hint");
const barEl    = document.getElementById("bar");
const spinner  = document.getElementById("spinner");

let current       = 0;
let front         = "A";
let busy          = false;
let hintDismissed = false;
let barRaf        = null;
let barStart      = null;

function url(index) {
  return `${BASE_URL}/${VIDEOS[index].file}`;
}

// ── Dots ─────────────────────────────────────────────────
function buildDots() {
  dotsEl.innerHTML = "";
  VIDEOS.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === 0 ? " active" : "");
    dotsEl.appendChild(d);
  });
}
function updateDots() {
  dotsEl.querySelectorAll(".dot").forEach((d, i) =>
    d.classList.toggle("active", i === current));
}

// ── Progress bar ─────────────────────────────────────────
function startBar(duration) {
  cancelAnimationFrame(barRaf);
  barEl.style.width = "0%";
  barStart = null;
  const total = (duration || 60) * 1000;
  function tick(now) {
    if (!barStart) barStart = now;
    const pct = Math.min(((now - barStart) / total) * 100, 100);
    barEl.style.width = pct + "%";
    if (pct < 100) barRaf = requestAnimationFrame(tick);
  }
  barRaf = requestAnimationFrame(tick);
}
function resetBar() {
  cancelAnimationFrame(barRaf);
  barEl.style.width = "0%";
  barStart = null;
}

// ── Caption ───────────────────────────────────────────────
function setCaption(text) {
  caption.classList.add("fade");
  setTimeout(() => {
    caption.textContent = text;
    caption.classList.remove("fade");
  }, 350);
}

// ── Core navigate ─────────────────────────────────────────
function goTo(index) {
  if (busy) return;
  busy = true;
  resetBar();

  current = ((index % VIDEOS.length) + VIDEOS.length) % VIDEOS.length;

  const backLayer = front === "A" ? layerB : layerA;
  const backVid   = front === "A" ? vidB   : vidA;
  const fwdLayer  = front === "A" ? layerA : layerB;
  const fwdVid    = front === "A" ? vidA   : vidB;

  // Preload next into back layer and play it
  backVid.src = url(current);
  backVid.load();

  backVid.play().catch(() => {});   // autoplay; browser may need muted (already set)

  // Crossfade
  backLayer.classList.add("active");
  requestAnimationFrame(() => fwdLayer.classList.remove("active"));
  front = front === "A" ? "B" : "A";

  setCaption(VIDEOS[current].caption);
  updateDots();

  setTimeout(() => {
    // Stop and unload the now-hidden video to free memory/bandwidth
    fwdVid.pause();
    fwdVid.removeAttribute("src");
    fwdVid.load();

    busy = false;

    // Start bar using actual video duration if known
    startBar(backVid.duration || 60);

    // Wire up auto-advance to the video's own ended event
    backVid.onended = next;
  }, CROSSFADE_MS + 100);
}

function next() { goTo(current + 1); }
function prev() { goTo(current - 1); }

// ── Keyboard ──────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") { dismissHint(); next(); }
  if (e.key === "ArrowLeft")  { dismissHint(); prev(); }
});

// ── Touch / swipe ─────────────────────────────────────────
let touchX = null;
document.addEventListener("touchstart", e => { touchX = e.touches[0].clientX; }, { passive: true });
document.addEventListener("touchend", e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) { dismissHint(); dx < 0 ? next() : prev(); }
  touchX = null;
}, { passive: true });

// ── Hint dismiss ──────────────────────────────────────────
function dismissHint() {
  if (!hintDismissed) { hintDismissed = true; hintEl.classList.add("hidden"); }
}
setTimeout(dismissHint, 5000);

// ── Init ──────────────────────────────────────────────────
function init() {
  buildDots();

  vidA.src = url(0);
  vidA.load();

  // Preload video 1 into layer B silently
  if (VIDEOS.length > 1) {
    vidB.src = url(1);
    vidB.load();
  }

  // Wait for video to be ready enough to play
  vidA.addEventListener("canplay", () => {
    spinner.classList.add("gone");
    layerA.classList.add("active");
    vidA.play().catch(() => {});
    caption.textContent = VIDEOS[0].caption;
    startBar(vidA.duration || 60);
    vidA.onended = next;
  }, { once: true });

  // Fallback if canplay never fires
  setTimeout(() => spinner.classList.add("gone"), 4000);
}

init();
</script>
</body>
</html>
