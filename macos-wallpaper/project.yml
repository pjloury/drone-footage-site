name: MacWallpaper
options:
  bundleIdPrefix: com.pjloury
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.pjloury.aerial-landscapes-wallpaper
    PRODUCT_NAME: MacWallpaper
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  MacWallpaper:
    type: application
    platform: macOS
    sources:
      - path: Sources/MacWallpaper
    resources:
      - path: Resources/Info.plist
        optional: true
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        CODE_SIGN_ENTITLEMENTS: Resources/MacWallpaper.entitlements
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: ""
        Release:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: ""
    dependencies: []
