<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glass" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0d0d0d"/>
  <!-- Liquid glass sheen -->
  <rect width="32" height="32" rx="7" fill="url(#glass)"/>
  <!-- Subtle rim -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>

  <!-- Arms (X pattern) -->
  <line x1="16" y1="16" x2="6.5"  y2="6.5"  stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="25.5" y2="6.5"  stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="6.5"  y2="25.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="25.5" y2="25.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Rotors -->
  <circle cx="6.5"  cy="6.5"  r="3.2" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="1.3"/>
  <circle cx="25.5" cy="6.5"  r="3.2" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="1.3"/>
  <circle cx="6.5"  cy="25.5" r="3.2" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="1.3"/>
  <circle cx="25.5" cy="25.5" r="3.2" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="1.3"/>

  <!-- Center body -->
  <circle cx="16" cy="16" r="2.2" fill="white" fill-opacity="0.92"/>
</svg>
